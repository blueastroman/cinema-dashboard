name: Refresh AMC Showtimes

on:
  workflow_dispatch:
    inputs:
      theatre_ids:
        description: "Optional comma-separated AMC theatre IDs. Leave blank to use configured NYC/Stamford filters."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh-amc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh AMC showtimes
        env:
          AMC_VENDOR_KEY: ${{ secrets.AMC_VENDOR_KEY }}
          AMC_THEATRE_IDS: ${{ inputs.theatre_ids }}
        run: python scripts/refresh_amc.py

      - name: Validate dataset
        run: python scripts/validate_dataset.py

      - name: Commit updated AMC data
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "daniel@dannymora.com"
          git config --local user.name "Daniel Mora"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "No AMC data changes to commit."
          else
            git commit -m "Refresh AMC showtimes"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push failed on attempt ${attempt}; retrying after remote update."
              sleep 5
            done
            echo "Failed to push AMC data after 3 attempts."
            exit 1
          fi
