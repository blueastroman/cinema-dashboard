name: Weekly Cinema Scrape

on:
  schedule:
    # Trigger on both UTC candidates, then gate to 8:00 AM America/New_York.
    - cron: "0 12 * * 3"
    - cron: "0 13 * * 3"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Run only at 8:00 AM New York time
        run: |
          hour=$(TZ=America/New_York date +%H)
          if [ "$hour" != "08" ]; then
            echo "Skipping run: local NY time is not 08:00."
            exit 0
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scrape.py

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Cinema Bot"
          git add public/data.json scripts/rating_cache.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Weekly cinema update — $(date +'%B %d, %Y')"
            # Rebase in case main advanced during this run.
            git pull --rebase origin main
            git push
          fi

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npx vercel deploy public/ --prod --yes --token ${{ secrets.VERCEL_TOKEN }} --name cinema-dashboard
