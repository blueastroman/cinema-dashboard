name: Weekly Cinema Scrape
on:
  schedule:
    - cron: "0 12 * * 3"
    - cron: "0 13 * * 3"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Run only at 8:00 AM New York time (skip gate for manual triggers)
        if: github.event_name == 'schedule'
        run: |
          hour=$(TZ=America/New_York date +%H)
          if [ "$hour" != "08" ]; then
            echo "Skipping run: local NY time is not 08:00."
            exit 0
          fi
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
          AMC_VENDOR_KEY: ${{ secrets.AMC_VENDOR_KEY }}
        run: python scripts/scrape.py
      - name: Validate dataset
        run: python scripts/validate_dataset.py
      - name: Commit updated data
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "daniel@dannymora.com"
          git config --local user.name "Daniel Mora"
          git add public/data.json scripts/rating_cache.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update weekly cinema data"
            git push
          fi
