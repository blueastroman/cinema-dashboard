name: Apply Prestige Tags

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write

jobs:
  apply-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply prestige tags
        run: python scripts/apply_prestige_tags.py

      - name: Validate dataset
        run: python scripts/validate_dataset.py

      - name: Commit updated tags
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "daniel@dannymora.com"
          git config --local user.name "Daniel Mora"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "No prestige tag changes to commit."
          else
            git commit -m "Apply prestige tags"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push failed on attempt ${attempt}; retrying after remote update."
              sleep 5
            done
            echo "Failed to push prestige tag updates after 3 attempts."
            exit 1
          fi
