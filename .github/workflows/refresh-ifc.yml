name: Refresh IFC Center Showtimes

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  refresh-ifc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh IFC Center showtimes
        run: python scripts/refresh_ifc.py

      - name: Validate dataset
        run: python scripts/validate_dataset.py

      - name: Commit updated IFC data
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "daniel@dannymora.com"
          git config --local user.name "Daniel Mora"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "No IFC data changes to commit."
          else
            git commit -m "Refresh IFC Center showtimes"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push failed on attempt ${attempt}; retrying."
              sleep 5
            done
            echo "Failed to push IFC data after 3 attempts."
            exit 1
          fi
