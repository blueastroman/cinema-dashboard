<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NYC Cinema — This Week</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --off-black: #111111;
      --charcoal: #1a1a1a;
      --dark-gray: #242424;
      --mid-gray: #3a3a3a;
      --muted: #666;
      --text: #e8e4dc;
      --text-dim: #9a9490;
      --cream: #f0ead8;
      --accent: #c8a96e;
      --accent-dim: #6b5a38;
      --watch: #4a9e6b;
      --watch-bg: #0f2a1a;
      --depends: #c8a96e;
      --depends-bg: #2a200a;
      --skip: #9e4a4a;
      --skip-bg: #2a0f0f;
      --safe-top: env(safe-area-inset-top, 0px);
      --font-sans: 'Manrope', sans-serif;
    }

    html {
      font-size: 17px;
      scroll-behavior: smooth;
      background: var(--black);
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    /* Film grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: calc(var(--safe-top) + 76px);
      background: var(--black);
      pointer-events: none;
      z-index: 109;
    }

    /* ── HEADER ────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--mid-gray);
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 110;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    header::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: calc(-1 * var(--safe-top));
      height: var(--safe-top);
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 32px;
    }

    .logo {
      font-family: var(--font-sans);
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: var(--cream);
      white-space: nowrap;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--accent);
    }

    /* ── FILTERS ───────────────────────────────────────────── */
    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 2px;
      border: 1px solid var(--mid-gray);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .filter-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--black);
    }

    /* ── HERO / STATS BAR ──────────────────────────────────── */
    .stats-bar {
      border-bottom: 1px solid var(--dark-gray);
      padding: 20px 40px;
    }

    .stats-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .date-scope-row {
      border-bottom: 1px solid var(--dark-gray);
      padding: 14px 40px;
    }

    .date-scope-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .date-scope-inner .filter-btn {
      font-size: 0.98rem;
      font-weight: 700;
      padding: 10px 20px;
      letter-spacing: 0.05em;
    }

    .date-picker-wrap {
      position: relative;
      display: inline-block;
    }

    .date-picker-wrap #date-picker {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.01;
      cursor: pointer;
    }

    .date-picker-wrap.active .filter-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--black);
    }

    .search-wrap {
      flex: 1;
      max-width: 420px;
      min-width: 220px;
      position: relative;
    }

    .theater-select {
      min-width: 180px;
    }

    .search-input {
      width: 100%;
      background: var(--dark-gray);
      border: 1px solid var(--mid-gray);
      border-radius: 2px;
      padding: 8px 14px 8px 34px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent-dim); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
    }

    .control-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .control-group.tight {
      gap: 8px;
    }

    .control-label {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 2px;
    }

    .saved-toggle.active {
      background: var(--watch-bg);
      border-color: var(--watch);
      color: var(--watch);
    }

    /* ── MAIN GRID ─────────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    /* ── VERDICT SECTION HEADERS ───────────────────────────── */
    .verdict-section {
      margin-bottom: 56px;
    }

    .verdict-section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--dark-gray);
    }

    .verdict-badge-large {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 2px;
      font-weight: 700;
    }

    .verdict-badge-large.watch {
      background: var(--watch-bg);
      color: var(--watch);
      border: 1px solid var(--watch);
    }
    .verdict-badge-large.depends {
      background: var(--depends-bg);
      color: var(--depends);
      border: 1px solid var(--depends);
    }
    .verdict-badge-large.skip {
      background: var(--skip-bg);
      color: var(--skip);
      border: 1px solid var(--skip);
    }

    .section-count {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── MOVIE GRID ────────────────────────────────────────── */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--mid-gray);
      border: 1px solid var(--mid-gray);
    }

    /* Compact list mode */
    body.compact-mode .movies-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body.compact-mode .movie-card {
      padding: 16px 18px;
      gap: 10px;
    }

    body.compact-mode .movie-title {
      font-size: 1.1rem;
      font-weight: 800;
    }

    body.compact-mode .movie-year {
      font-size: 0.78rem;
    }

    body.compact-mode .card-tags,
    body.compact-mode .card-reason,
    body.compact-mode .card-plot,
    body.compact-mode .card-actions,
    body.compact-mode .expand-theaters,
    body.compact-mode .theaters-detail {
      display: none;
    }

    /* ── MOVIE CARD ────────────────────────────────────────── */
    .movie-card {
      background: var(--off-black);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: background 0.15s ease;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .movie-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.15s;
    }

    .movie-card.watch::before { background: var(--watch); }
    .movie-card.depends::before { background: var(--depends); }
    .movie-card.skip::before { background: var(--skip); }

    .movie-card:hover {
      background: var(--charcoal);
    }

    /* Card top row */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-top > div {
      min-width: 0;
      flex: 1;
    }

    .movie-title {
      font-family: var(--font-sans);
      font-size: 1.65rem;
      font-weight: 900;
      line-height: 1.2;
      color: var(--cream);
      flex: 1;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .movie-year {
      font-family: var(--font-sans);
      font-size: 0.86rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Verdict badge */
    .verdict-pill {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .verdict-pill.watch { background: var(--watch-bg); color: var(--watch); }
    .verdict-pill.depends { background: var(--depends-bg); color: var(--depends); }
    .verdict-pill.skip { background: var(--skip-bg); color: var(--skip); }

    /* Meta row */
    .card-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-meta.secondary {
      gap: 12px;
      margin-top: -8px;
      opacity: 0.78;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .meta-value {
      font-family: var(--font-sans);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .meta-value.rt-high { color: var(--watch); }
    .meta-value.rt-mid { color: var(--depends); }
    .meta-value.rt-low { color: var(--skip); }
    .meta-value.cs-score { color: var(--accent); }

    .meta-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-sep {
      width: 1px;
      height: 28px;
      background: var(--dark-gray);
    }

    /* Genre + runtime row */
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      background: var(--dark-gray);
      color: var(--text-dim);
    }

    /* Reason */
    .card-reason {
      font-size: 0.88rem;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.5;
      border-left: 2px solid var(--mid-gray);
      padding-left: 12px;
    }

    /* Plot */
    .card-plot {
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Theaters */
    .card-theaters {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .theater-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .theater-name {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .showtime-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .showtime-chip {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 2px;
      border: 1px solid var(--mid-gray);
      color: var(--text-dim);
      text-decoration: none;
      display: inline-block;
    }

    a.showtime-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      cursor: pointer;
    }

    .theater-day {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 2px;
      letter-spacing: 0.03em;
    }

    /* Expand toggle */
    .expand-theaters {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-top: 4px;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }

    .expand-theaters:hover { color: var(--accent); }

    .theaters-detail { display: none; }
    .theaters-detail.open { display: flex; flex-direction: column; gap: 10px; }

    /* Theater link */
    .theater-name a {
      color: var(--accent);
      text-decoration: none;
    }
    .theater-name a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── CARD ACTIONS ──────────────────────────────────────── */
    .card-actions {
      display: flex;
      gap: 8px;
      padding-top: 4px;
      border-top: 1px solid var(--dark-gray);
      margin-top: 4px;
    }

    .action-btn {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      border: 1px solid var(--mid-gray);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .action-btn.active-watched { border-color: var(--watch); color: var(--watch); background: var(--watch-bg); }
    .action-btn.active-hidden { border-color: var(--skip); color: var(--skip); background: var(--skip-bg); }

    /* Saved card overlay */
    .movie-card.is-watched {
      background: linear-gradient(180deg, rgba(44, 74, 54, 0.34), rgba(20, 28, 22, 0.92));
      box-shadow: inset 0 0 0 1px rgba(79, 190, 128, 0.34), 0 0 0 1px rgba(79, 190, 128, 0.1);
    }
    .movie-card.is-watched .movie-title::after {
      content: ' ✓';
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: var(--watch);
      font-weight: 700;
    }

    /* Hidden card */
    .movie-card.is-hidden {
      display: none;
    }

    /* ── EMPTY STATE ───────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }

    .empty-state p {
      font-family: var(--font-sans);
      font-size: 1.15rem;
      font-weight: 600;
    }

    .empty-state-detail {
      margin-top: 12px;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--text-dim);
    }

    .empty-state-hint {
      margin-top: 18px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── LOADING ────────────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .loading-text {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── ANIMATIONS ────────────────────────────────────────── */
    .movie-card {
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* stagger via nth-child */
    .movie-card:nth-child(1) { animation-delay: 0ms; }
    .movie-card:nth-child(2) { animation-delay: 40ms; }
    .movie-card:nth-child(3) { animation-delay: 80ms; }
    .movie-card:nth-child(4) { animation-delay: 120ms; }
    .movie-card:nth-child(5) { animation-delay: 160ms; }
    .movie-card:nth-child(6) { animation-delay: 200ms; }

    /* ── THEATERS VIEW ─────────────────────────────────────── */
    .theater-view-section {
      margin-bottom: 52px;
    }

    .theater-view-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 4px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--accent);
    }

    .theater-view-name {
      font-family: var(--font-sans);
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--cream);
    }

    .theater-view-name a {
      color: var(--cream);
      text-decoration: none;
    }
    .theater-view-name a:hover { color: var(--accent); }

    .theater-view-count {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .theater-view-grid {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .theater-film-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 4px 2px 10px;
    }

    .theater-film-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 14px 14px 56px 16px;
      border: 1px solid var(--dark-gray);
      border-radius: 2px;
      position: relative;
      transition: background 0.12s ease;
      min-width: 0;
    }

    .theater-film-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }

    .theater-film-row.watch::before  { background: var(--watch); }
    .theater-film-row.depends::before { background: var(--depends); }
    .theater-film-row.skip::before   { background: var(--skip); }
    .theater-film-row:hover { background: var(--charcoal); }
    .theater-film-row.is-watched {
      background: linear-gradient(180deg, rgba(44, 74, 54, 0.34), rgba(20, 28, 22, 0.94));
      box-shadow: inset 0 0 0 1px rgba(79, 190, 128, 0.34), 0 0 0 1px rgba(79, 190, 128, 0.1);
    }

    .theater-film-info {
      width: 100%;
      min-width: 0;
    }

    .theater-film-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .theater-film-title {
      font-family: var(--font-sans);
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--cream);
      line-height: 1.25;
      min-width: 0;
      flex: 1;
    }

    .theater-film-title a {
      color: inherit;
      text-decoration: none;
    }
    .theater-film-title a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .theater-film-sub {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .theater-film-meta {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    .confidence-note {
      display: inline-flex;
      align-items: center;
      margin-top: 10px;
      padding: 4px 8px;
      border: 1px solid rgba(200, 169, 110, 0.35);
      background: rgba(200, 169, 110, 0.08);

<script>
let allMovies = [];
let dateScope = 'today'; // week | today | tomorrow
let selectedDateISO = '';
let activeTheater = 'all';
let activeAmc = 'AMC Lincoln Square 13';
let hasExplicitAmcFilter = false;
let activeGenre = 'all';
let searchQuery = '';
let activeSort = 'day';
let showMode = 'all';
let viewMode = 'theaters';
let hasLoadedData = false;
let theaterMeta = {};
const CONFIDENCE_THRESHOLD = 60;
let effectiveConfidenceThreshold = CONFIDENCE_THRESHOLD;
const NYC_TIMEZONE = 'America/New_York';
const DEFAULT_THEATER_META = {
  'Metrograph': { slug: 'metrograph', short_name: 'Metrograph', sort_name: 'Metrograph', official_url: 'https://metrograph.com', source_type: 'serpapi', aliases: ['metro'] },
  'IFC Center': { slug: 'ifc', short_name: 'IFC', sort_name: 'IFC', official_url: 'https://www.ifccenter.com', source_type: 'serpapi', aliases: ['ifc'] },
  'Angelika Film Center': { slug: 'angelika', short_name: 'Angelika', sort_name: 'Angelika', official_url: 'https://angelikafilmcenter.com/nyc', source_type: 'serpapi', aliases: ['angelika'] },
  'Film Forum': { slug: 'film-forum', short_name: 'Film Forum', sort_name: 'Film Forum', official_url: 'https://www.filmforum.org/now-playing/', source_type: 'serpapi', aliases: ['film', 'film forum'] },
  'Village East by Angelika': { slug: 'village-east', short_name: 'Village East', sort_name: 'Village East', official_url: 'https://angelikafilmcenter.com/villageeast', source_type: 'serpapi', aliases: ['village', 'village east'] },
  'Film at Lincoln Center': { slug: 'flc', short_name: 'FLC', sort_name: 'FLC', official_url: 'https://www.filmlinc.org/now-playing/', source_type: 'serpapi', aliases: ['flc', 'film linc', 'lincoln center', 'film at lincoln center'] },
  'Alamo Drafthouse Lower Manhattan': { slug: 'alamo', short_name: 'Alamo', sort_name: 'Alamo', official_url: 'https://drafthouse.com/nyc', source_type: 'serpapi', aliases: ['alamo'] },
  'Paris Theater': { slug: 'paris', short_name: 'Paris', sort_name: 'Paris', official_url: 'https://www.paristheaternyc.com/', source_type: 'serpapi', aliases: ['paris'] },
  'Museum of Modern Art': { slug: 'moma', short_name: 'MoMA', sort_name: 'MoMA', official_url: 'https://www.moma.org/calendar/film/', source_type: 'serpapi', aliases: ['moma', 'museum of modern art', 'moma film'] },
};

function slugify(value) {
  return String(value || '')
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

// ── DATE HELPERS ───────────────────────────────────────────────────────────

function readFiltersFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const scope = params.get('date');
  const customDate = params.get('on');
  const theater = params.get('theater');
  const amc = params.get('amc');
  const genre = params.get('genre');
  const search = params.get('q');
  const sort = params.get('sort');
  const show = params.get('show');
  const saved = params.get('saved');

  if (scope === 'today' || scope === 'tomorrow' || scope === 'week') dateScope = scope;
  if (scope === 'custom' && customDate) {
    dateScope = 'custom';
    selectedDateISO = customDate;
  }
  if (theater) activeTheater = theater;
  hasExplicitAmcFilter = params.has('amc');
  if (amc) activeAmc = amc;
  if (genre) activeGenre = genre;
  if (typeof search === 'string') searchQuery = search;
  if (sort === 'day' || sort === 'rating') activeSort = sort;
  if (show === 'saved' || show === 'hidden' || show === 'all') showMode = show;
  if ((saved === '1' || saved === 'true') && showMode === 'all') showMode = 'saved';
}

function updateUrlFromState() {
  const params = new URLSearchParams();
  params.set('date', dateScope);
  if (dateScope === 'custom' && selectedDateISO) params.set('on', selectedDateISO);
  if (activeTheater !== 'all') params.set('theater', getTheaterStateSlug(activeTheater));
  if (activeAmc !== 'all') params.set('amc', getTheaterStateSlug(activeAmc));
  if (activeGenre !== 'all') params.set('genre', slugify(activeGenre));
  if (searchQuery) params.set('q', searchQuery);
  if (activeSort !== 'day') params.set('sort', activeSort);
  if (showMode !== 'all') params.set('show', showMode);

  const next = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ''}`;
  window.history.replaceState({}, '', next);
}

function getNYNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: NYC_TIMEZONE }));
}

function getTodayLabel() {
  // Returns e.g. "Mar 31" to match against "Tue Mar 31" schedule day strings
  return getNYNow().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function toISODate(date) {
  if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function parseISODate(iso) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(String(iso || ''))) return null;
  return new Date(`${iso}T12:00:00`);
}

function getTomorrowLabel() {
  const d = getNYNow();
  d.setDate(d.getDate() + 1);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getThisWeekDayOrder() {
  // Returns sorted day labels starting from today
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const todayIdx = getNYNow().getDay();
  const ordered = [];
  for (let i = 0; i < 7; i++) ordered.push(days[(todayIdx + i) % 7]);
  return ordered;
}

function getActiveDayFilterLabel() {
  if (dateScope === 'today') return getTodayLabel();
  if (dateScope === 'tomorrow') return getTomorrowLabel();
  return null;
}

function getCustomDateLabel() {
  const parsed = parseISODate(selectedDateISO);
  if (!parsed) return 'Select Date';
  return parsed.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).replace(',', '');
}

function getShowtimeISO(dayLabel) {
  const parsed = parseShowtimeDate(dayLabel, '12:00PM');
  return parsed ? toISODate(parsed) : '';
}

function getAvailableDateBounds(data = null) {
  const movies = (data?.movies || allMovies) || [];
  const todayISO = toISODate(getNYNow());
  let maxISO = todayISO;

  for (const movie of movies) {
    for (const theater of (movie?.theaters || [])) {
      for (const slot of (theater?.schedule || [])) {
        const iso = getShowtimeISO(slot?.day || '');
        if (!iso) continue;
        if (iso >= todayISO && iso > maxISO) maxISO = iso;
      }
    }
  }

  return { min: todayISO, max: maxISO };
}

function getShowtimeDayLabel(dayLabel) {
  const raw = String(dayLabel || '').trim();
  if (!raw) return '';
  if (/^today$/i.test(raw)) {
    return getNYNow().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).replace(',', '');
  }
  if (/^tomorrow$/i.test(raw)) {
    const d = getNYNow();
    d.setDate(d.getDate() + 1);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).replace(',', '');
  }
  const explicit = raw.match(/\b(Sun|Mon|Tue|Wed|Thu|Fri|Sat)\b\.?\s+\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+(\d{1,2})\b/i);
  if (explicit) {
    return `${explicit[1]} ${explicit[2]} ${explicit[3]}`;
  }
  const parsed = parseShowtimeDate(raw, '12:00PM');
  if (parsed) {
    return parsed.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).replace(',', '');
  }
  return raw;
}

function dayMatchesActiveScope(dayLabel, activeDayLabel) {
  if (dateScope === 'custom' && selectedDateISO) {
    return getShowtimeISO(dayLabel) === selectedDateISO;
  }
  if (!activeDayLabel) return true;
  const raw = String(dayLabel || '').trim();
  if (!raw) return false;
  const activeISO = activeDayLabel === getTodayLabel()
    ? toISODate(getNYNow())
    : (activeDayLabel === getTomorrowLabel()
      ? toISODate(new Date(getNYNow().getFullYear(), getNYNow().getMonth(), getNYNow().getDate() + 1))
      : '');
  const rawISO = getShowtimeISO(raw);
  if (activeISO && rawISO && activeISO === rawISO) return true;
  if (raw.includes(activeDayLabel)) return true;
  if (/^today$/i.test(raw)) return activeDayLabel === getTodayLabel();
  if (/^tomorrow$/i.test(raw)) return activeDayLabel === getTomorrowLabel();
  return false;
}

function parseShowtimeDate(dayLabel, timeLabel) {
  const timeStr = String(timeLabel || '').trim().toUpperCase().replace(/\s+/g, ' ');
  if (!timeStr) return null;

  let hour = null;
  let minute = 0;
  const meridiemMatch = timeStr.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  const twentyFourHourMatch = !meridiemMatch ? timeStr.match(/^(\d{1,2}):(\d{2})$/) : null;
  if (meridiemMatch) {
    hour = parseInt(meridiemMatch[1], 10);
    minute = parseInt(meridiemMatch[2] || '0', 10);
    const meridiem = meridiemMatch[3].toUpperCase();
    if (meridiem === 'PM' && hour !== 12) hour += 12;
    if (meridiem === 'AM' && hour === 12) hour = 0;
  } else if (twentyFourHourMatch) {
    hour = parseInt(twentyFourHourMatch[1], 10);
    minute = parseInt(twentyFourHourMatch[2] || '0', 10);
  } else {
    return null;
  }

  const now = getNYNow();
  const dayText = String(dayLabel || '').trim();
  let baseDate = null;

  if (/^today$/i.test(dayText)) {
    baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  } else if (/^tomorrow$/i.test(dayText)) {
    baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  } else if (/^yesterday$/i.test(dayText)) {
    baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  }

  const mdMatch = !baseDate ? dayText.match(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+(\d{1,2})\b/i) : null;
  const dmMatch = !baseDate ? dayText.match(/\b(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\b/i) : null;
  if (!baseDate && mdMatch) {
    baseDate = new Date(now.getFullYear(), new Date(`${mdMatch[1]} 1, ${now.getFullYear()}`).getMonth(), parseInt(mdMatch[2], 10));
  } else if (!baseDate && dmMatch) {
    baseDate = new Date(now.getFullYear(), new Date(`${dmMatch[2]} 1, ${now.getFullYear()}`).getMonth(), parseInt(dmMatch[1], 10));
  } else if (!baseDate) {
    const weekdayMap = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6 };
    const weekday = weekdayMap[dayText.slice(0, 3).toLowerCase()];
    if (weekday === undefined) return null;
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let diff = weekday - today.getDay();
    if (diff < 0) diff += 7;
    baseDate = new Date(today);
    baseDate.setDate(today.getDate() + diff);
  }

  if (!(baseDate instanceof Date) || Number.isNaN(baseDate.getTime())) return null;
  baseDate.setHours(hour, minute, 0, 0);
  return baseDate;
}

function formatShowtimeLabel(timeLabel) {
  const raw = String(timeLabel || '').trim();
  if (!raw) return '';
  const twentyFourHourMatch = raw.match(/^(\d{1,2}):(\d{2})$/);
  if (!twentyFourHourMatch) return raw;
  let hour = parseInt(twentyFourHourMatch[1], 10);
  const minute = twentyFourHourMatch[2];
  const meridiem = hour >= 12 ? 'pm' : 'am';
  hour = hour % 12 || 12;
  return `${hour}:${minute}${meridiem}`;
}

function hasUpcomingShowtimes(movie) {
  const now = getNYNow();
  return (movie.theaters || []).some(t =>
    (t.schedule || []).some(s =>
      (s.times || []).some(time => {
        const showAt = parseShowtimeDate(s.day, time);
        return !!showAt && showAt >= now;
      })
    )
  );
}

function getVisibleTheaters(movie) {
  const theaters = movie?.theaters || [];
  return theaters.filter(t => {
    const canonical = getCanonicalTheaterName(t?.name);
    const isAmc = /^AMC\b/i.test(canonical);

    if (isAmc) {
      if (activeAmc === 'none') return false;
      if (activeTheater === 'AMC') {
        return activeAmc === 'all' ? true : canonical === activeAmc;
      }
      return activeAmc !== 'all' && canonical === activeAmc;
    }

    if (activeTheater === 'all') return true;
    return canonical === activeTheater;
  });
}

function moviePlayingOn(movie, dateLabel) {
  const now = getNYNow();
  let targetISO = '';
  if (dateLabel === getTodayLabel()) {
    targetISO = toISODate(now);
  } else if (dateLabel === getTomorrowLabel()) {
    targetISO = toISODate(new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1));
  }
  if (!targetISO) return false;
  return getVisibleTheaters(movie).some(t =>
    (t.schedule || []).some(s =>
      getShowtimeISO(s.day) === targetISO &&
      (s.times || []).some(time => {
        const showAt = parseShowtimeDate(s.day, time);
        return !!showAt && showAt >= now;
      })
    )
  );
}

function moviePlayingOnISO(movie, dateISO) {
  const now = getNYNow();
  return getVisibleTheaters(movie).some(t =>
    (t.schedule || []).some(s =>
      getShowtimeISO(s.day) === dateISO &&
      (s.times || []).some(time => {
        const showAt = parseShowtimeDate(s.day, time);
        return !!showAt && showAt >= now;
      })
    )
  );
}

function movieEarliestDayIdx(movie, dayOrder) {
  let best = 99;
  getVisibleTheaters(movie).forEach(t =>
    (t.schedule || []).forEach(s => {
      const d = (s.day || '').slice(0, 3);
      const idx = dayOrder.indexOf(d);
      if (idx !== -1 && idx < best) best = idx;
    })
  );
  return best;
}

// ── THEATER META ───────────────────────────────────────────────────────────
function getTheaterMeta(name) {
  const raw = String(name || '').trim();
  if (!raw) return null;
  if (theaterMeta[raw]) return theaterMeta[raw];
  if (DEFAULT_THEATER_META[raw]) return DEFAULT_THEATER_META[raw];
  if (/^AMC\b/i.test(raw)) {
    return {
      slug: slugify(raw),
      short_name: raw,
      sort_name: raw,
      official_url: 'https://www.amctheatres.com/',
      source_type: 'amc',
      aliases: [],
    };
  }
  return {
    slug: slugify(raw),
    short_name: raw,
    sort_name: raw,
    official_url: '',
    source_type: 'serpapi',
    aliases: [],
  };
}

function getTheaterStateSlug(name) {
  if (name === 'all' || name === 'AMC' || name === 'none') return String(name).toLowerCase();
  const meta = getTheaterMeta(name);
  return meta?.slug || slugify(name);
}

function resolveTheaterValue(value, candidates = []) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (raw === 'all' || raw === 'AMC' || raw === 'none') return raw;

  const lowered = raw.toLowerCase();
  const bySlug = candidates.find(name => getTheaterStateSlug(name) === lowered);
  if (bySlug) return bySlug;

  const byAlias = candidates.find(name => {
    const meta = getTheaterMeta(name);
    const aliases = [name, ...(meta?.aliases || [])].map(item => slugify(item));
    return aliases.includes(slugify(raw));
  });
  if (byAlias) return byAlias;

  return candidates.find(name => String(name).toLowerCase() === lowered) || '';
}

function resolveGenreValue(value, genres = []) {
  const raw = String(value || '').trim();
  if (!raw || raw === 'all') return 'all';
  return genres.find(g => slugify(g) === slugify(raw)) || 'all';
}

function getTheaterUrl(name) {
  const canonical = getCanonicalTheaterName(name) || String(name || '').trim();
  return getTheaterMeta(canonical)?.official_url || '';
}

function getAvailableTheaters(data = null) {
  const observed = new Set([
    ...((data?.theaters || [])),
    ...(((data?.movies || allMovies) || []).flatMap(m => (m?.theaters || []).map(t => t?.name))),
  ].map(t => getCanonicalTheaterName(t)).filter(Boolean));
  return [...observed]
    .filter(name => !/^AMC\b/i.test(name))
    .sort((a, b) => getTheaterSortLabel(a).localeCompare(getTheaterSortLabel(b), undefined, { sensitivity: 'base' }));
}

function getAvailableAmcTheaters(data = null) {
  const observed = new Set([
    ...((data?.theaters || [])),
    ...(((data?.movies || allMovies) || []).flatMap(m => (m?.theaters || []).map(t => t?.name))),
  ].map(t => getCanonicalTheaterName(t)).filter(Boolean));
  return [...observed]
    .filter(name => /^AMC\b/i.test(name))
    .sort((a, b) => getTheaterSortLabel(a).localeCompare(getTheaterSortLabel(b), undefined, { sensitivity: 'base' }));
}

// ── MOCK REASON STRINGS (suppress these) ───────────────────────────────────
const MOCK_REASONS = [
  "Critics are united — this one earns its runtime.",
  "Strong but divisive — know what you're signing up for.",
  "The scores don't lie — pass on this one.",
];

function hasReviewSignals(movie) {
  const ratings = movie?.ratings || {};
  const rt = ratings.rt;
  const cinemaScore = ratings.cinemaScore;
  const imdb = ratings.imdb;
  const letterboxd = ratings.letterboxd;

  const hasRT = typeof rt === 'string' && rt.includes('%');
  const hasCinemaScore = cinemaScore && cinemaScore !== 'N/A';
  const hasImdb = imdb && imdb !== 'N/A';
  const hasLetterboxd = letterboxd && letterboxd !== 'N/A';

  return Boolean(hasRT || hasCinemaScore || hasImdb || hasLetterboxd);
}

function getDisplayVerdict(movie) {
  const rawVerdict = movie?.verdict?.verdict || 'SKIP';
  const cinemaWeight = getCinemaScoreWeight(movie?.ratings?.cinemaScore);
  if (cinemaWeight !== null) {
    return cinemaWeight <= 65 ? 'SKIP' : 'WATCH';
  }

  const rt = parseInt(movie?.ratings?.rt || '', 10);
  if (Number.isFinite(rt)) {
    return rt < 50 ? 'SKIP' : 'WATCH';
  }

  const lb = parseFloat(getLetterboxdScore(movie));
  if (Number.isFinite(lb)) {
    return lb < 2.7 ? 'SKIP' : 'WATCH';
  }

  if (rawVerdict === 'SKIP' && !hasReviewSignals(movie)) return 'WATCH';
  return rawVerdict === 'SKIP' ? 'SKIP' : 'WATCH';
}

function getCardTone(movie) {
  const cinemaTone = getCinemaScoreTone(movie?.ratings?.cinemaScore);
  if (cinemaTone) return cinemaTone;

  const rt = parseInt(movie?.ratings?.rt || '', 10);
  if (Number.isFinite(rt)) {
    if (rt < 50) return 'skip';
    if (rt < 70) return 'depends';
    return 'watch';
  }

  return getDisplayVerdict(movie).toLowerCase();
}

function getDisplayReason(movie) {
  if (!hasReviewSignals(movie)) return '';
  return movie?.verdict?.reason || '';
}

function getDisplayTheaterName(name) {
  const canonical = getCanonicalTheaterName(name) || String(name || '').trim();
  return getTheaterMeta(canonical)?.short_name || canonical;
}

function getTheaterSortLabel(name) {
  return (getTheaterMeta(name)?.sort_name || getDisplayTheaterName(name))
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, ' ')
    .trim();
}

function getRuntimeMinutes(runtime) {
  const match = String(runtime || '').match(/(\d+)/);
  if (!match) return null;
  const minutes = parseInt(match[1], 10);
  return Number.isFinite(minutes) ? minutes : null;
}

function getCanonicalTheaterName(name) {
  const raw = String(name || '').trim();
  if (!raw) return '';
  const direct = theaterMeta[raw] || DEFAULT_THEATER_META[raw];
  if (direct) return raw;
  const lowered = raw.toLowerCase();
  const knownNames = [...new Set([...Object.keys(DEFAULT_THEATER_META), ...Object.keys(theaterMeta)])];
  const match = knownNames.find(name => {
    const meta = getTheaterMeta(name);
    const aliases = [name, ...(meta?.aliases || [])];
    return aliases.some(alias => alias.toLowerCase() === lowered);
  });
  return match || raw;
}

function getCinemaScoreWeight(score) {
  if (!score || score === 'N/A') return null;
  const normalized = String(score).trim().toUpperCase();
  const map = {
    'A+': 130, 'A': 120, 'A-': 115,
    'B+': 105, 'B': 100, 'B-': 95,
    'C+': 85, 'C': 80, 'C-': 75,
    'D+': 65, 'D': 60, 'D-': 55,
    'F': 30
  };
  return map[normalized] ?? null;
}

function getCinemaScoreTone(score) {
  const weight = getCinemaScoreWeight(score);
  if (weight === null) return null;
  if (weight >= 105) return 'watch';
  if (weight >= 85) return 'depends';
  return 'skip';
}

function getCinemaScoreClass(score) {
  const tone = getCinemaScoreTone(score);
  if (tone === 'watch') return 'cs-high';
  if (tone === 'depends') return 'cs-mid';
  if (tone === 'skip') return 'cs-low';
  return '';
}

function getLetterboxdScore(movie) {
  const raw = movie?.ratings?.letterboxd;
  if (raw && raw !== 'N/A') return String(raw);
  const imdb = parseFloat(movie?.ratings?.imdb);
  if (Number.isFinite(imdb) && imdb > 0) return (imdb / 2).toFixed(1);
  return null;
}

function getScoreHierarchy(movie) {
  const ratings = movie?.ratings || {};
  const cinemaScore = (ratings.cinemaScore && ratings.cinemaScore !== 'N/A') ? String(ratings.cinemaScore).trim().toUpperCase() : null;
  const rt = (ratings.rt && ratings.rt !== 'N/A') ? String(ratings.rt) : null;
  const letterboxd = getLetterboxdScore(movie);

  let rtClass = '';
  if (rt) {
    const n = parseInt(rt, 10);
    rtClass = n >= 70 ? 'rt-high' : n >= 50 ? 'rt-mid' : 'rt-low';
  }

  const scores = [];
  if (cinemaScore) scores.push({ key: 'cinema', value: cinemaScore, label: 'Audience', shortLabel: 'CS', className: getCinemaScoreClass(cinemaScore) });
  if (rt) scores.push({ key: 'rt', value: rt, label: 'Critics', shortLabel: 'RT', className: rtClass });
  if (letterboxd) scores.push({ key: 'lb', value: letterboxd, label: 'LB', shortLabel: 'LB', className: 'lb-score' });

  return {
    primary: scores[0] || null,
    secondary: scores.slice(1)
  };
}

function getPriorityScore(movie) {
  const cinemaWeight = getCinemaScoreWeight(movie?.ratings?.cinemaScore);
  if (cinemaWeight !== null) return cinemaWeight;

  const rt = parseInt(movie?.ratings?.rt || '0', 10);
  if (Number.isFinite(rt)) return rt;

  const lb = parseFloat(getLetterboxdScore(movie));
  if (Number.isFinite(lb)) return lb * 20;

  return 0;
}

function getMovieConfidence(movie) {
  const ratings = movie?.ratings || {};
  const theaters = movie?.theaters || [];
  const title = String(movie?.title || '').trim();
  const now = getNYNow();

  let score = 0;

  if (title.length >= 2 && title.length <= 80) score += 12;
  if (/[A-Za-z]/.test(title)) score += 4;

  const year = parseInt(String(ratings.year || ''), 10);
  if (Number.isFinite(year) && year >= 1888 && year <= now.getFullYear() + 1) score += 12;

  const director = String(ratings.director || '').trim();
  if (director.length >= 3) score += 8;

  const genre = String(ratings.genre || '').trim();
  if (genre && genre !== 'N/A') score += 8;

  const plot = String(ratings.plot || '').trim();
  if (plot.length >= 60) score += 12;

  const rt = String(ratings.rt || '').trim();
  const hasRT = /^\d{1,3}%$/.test(rt);
  if (hasRT) score += 10;

  const imdb = parseFloat(String(ratings.imdb || ''));
  const hasImdb = Number.isFinite(imdb) && imdb > 0 && imdb <= 10;
  if (hasImdb) score += 8;

  const cinema = String(ratings.cinemaScore || '').trim().toUpperCase();
  const hasCinemaScore = /^(A\+|A-|A|B\+|B-|B|C\+|C-|C|D\+|D-|D|F)$/.test(cinema);
  if (hasCinemaScore) score += 6;

  const lb = parseFloat(String(ratings.letterboxd || ''));
  const hasLetterboxd = Number.isFinite(lb) && lb > 0 && lb <= 5;
  if (hasLetterboxd) score += 6;

  if (theaters.length) score += 8;

  let hasSchedule = false;
  let hasAnyTime = false;
  for (const theater of theaters) {
    const schedule = theater?.schedule || [];
    if (schedule.length) hasSchedule = true;
    for (const day of schedule) {
      const times = day?.times || [];
      if (times.length) hasAnyTime = true;
    }
  }
  if (hasSchedule) score += 8;
  if (hasAnyTime) score += 8;

  const hasAnyReviewSignal = hasRT || hasImdb || hasCinemaScore || hasLetterboxd;
  if (!hasAnyReviewSignal) score -= 8;
  if (plot.length < 20) score -= 8;
  if (!hasAnyTime) score -= 10;

  return score;
}

function getConfidenceNote(movie) {
  const score = movie?._confidence ?? getMovieConfidence(movie);
  const ratings = movie?.ratings || {};
  const hasReviews = hasReviewSignals(movie);
  const hasCoreMeta = Boolean(ratings.genre && ratings.runtime && ratings.director && ratings.year);
  if (score >= CONFIDENCE_THRESHOLD + 10 && hasReviews && hasCoreMeta) return '';
  if (effectiveConfidenceThreshold === 0 && hasReviews) return '';
  if (!hasReviews) return 'Showtimes only';
  if (!hasCoreMeta) return 'Partial metadata';
  if (score < CONFIDENCE_THRESHOLD + 10) return 'Low confidence';
  return '';
}

function computeEffectiveConfidenceThreshold(movies) {
  const total = movies.length || 0;
  if (!total) return 0;
  const richMetaCount = movies.filter(movie => {
    const ratings = movie?.ratings || {};
    return Boolean(ratings.genre && ratings.runtime && ratings.director && ratings.year);
  }).length;
  return richMetaCount / total < 0.35 ? 0 : CONFIDENCE_THRESHOLD;
}

function describeActiveDateScope() {
  if (dateScope === 'today') return 'today';
  if (dateScope === 'tomorrow') return 'tomorrow';
  if (dateScope === 'week') return 'this week';
  if (dateScope === 'custom' && selectedDateISO) return getCustomDateLabel();
  return 'this range';
}

function getEmptyStateMessage() {
  const parts = [];
  if (showMode === 'saved') parts.push('saved');
  if (showMode === 'hidden') parts.push('hidden');
  if (activeGenre !== 'all') parts.push(activeGenre.toLowerCase());
  if (activeTheater === 'AMC') {
    parts.push(activeAmc !== 'all' ? activeAmc : 'AMC');
  } else if (activeAmc === 'none') {
    parts.push('non-AMC');
  } else if (activeTheater !== 'all') {
    parts.push(getDisplayTheaterName(activeTheater));
  }
  const subject = parts.length ? parts.join(' ') : 'films';
  return `No ${subject} match ${describeActiveDateScope()}.`;
}

function getEmptyStateHint() {
  if (showMode === 'saved') return 'Try switching Show back to All or broadening the date range.';
  if (showMode === 'hidden') return 'Try switching Show back to All or clearing one of the other filters.';
  if (activeGenre !== 'all') return 'Try clearing the genre filter or switching theaters.';
  if (activeTheater !== 'all') return 'Try All Theaters or move from Today to This Week.';
  return 'Try a wider date range or clear one of the filters.';
}

function renderEmptyState(main) {

      <p>${getEmptyStateMessage()}</p>
      <div class="empty-state-detail">Current filters are narrowing the board more than the scraped schedule can support right now.</div>

}

// ── WATCHED / HIDDEN STATE ─────────────────────────────────────────────────
function getWatched() { try { return JSON.parse(localStorage.getItem('cinema_watched') || '[]'); } catch { return []; } }
function getHidden()  { try { return JSON.parse(localStorage.getItem('cinema_hidden')  || '[]'); } catch { return []; } }
function getMovieStorageKeys(movieOrId, fallbackTitle = '') {
  if (typeof movieOrId === 'object' && movieOrId) {
    return [movieOrId.id, movieOrId.title].filter(Boolean);
  }
  return [movieOrId, fallbackTitle].filter(Boolean);
}
function hasStoredMovie(list, movieOrId, fallbackTitle = '') {
  return getMovieStorageKeys(movieOrId, fallbackTitle).some(key => list.includes(key));
}
function toggleWatched(movieId, fallbackTitle = '') {
  const list = getWatched();
  const keys = getMovieStorageKeys(movieId, fallbackTitle);
  const existingIdx = list.findIndex(item => keys.includes(item));
  if (existingIdx > -1) {
    list.splice(existingIdx, 1);
  } else if (movieId) {
    list.push(movieId);
  }
  localStorage.setItem('cinema_watched', JSON.stringify(list));
}
function toggleHidden(movieId, fallbackTitle = '') {
  const list = getHidden();
  const keys = getMovieStorageKeys(movieId, fallbackTitle);
  const existingIdx = list.findIndex(item => keys.includes(item));
  if (existingIdx > -1) {
    list.splice(existingIdx, 1);
  } else if (movieId) {
    list.push(movieId);
  }
  localStorage.setItem('cinema_hidden', JSON.stringify(list));
}

// ── DATA LOAD ──────────────────────────────────────────────────────────────

async function loadData() {
  try {
    readFiltersFromUrl();
    const res = await fetch('./data.json?t=' + Date.now());
    if (!res.ok) {
      throw new Error(`Failed to load data.json (${res.status})`);
    }
    const data = await res.json();
    if (!data || !Array.isArray(data.movies)) {
      throw new Error('Invalid dashboard payload');
    }
    initDashboard(data);
  } catch (e) {
    renderLoadError(e);
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────

function initDashboard(data) {
  theaterMeta = { ...DEFAULT_THEATER_META, ...(data.theater_meta || {}) };
  allMovies = (data.movies || []).map(movie => ({
    ...movie,
    id: movie.id || slugify(`${movie.title}-${movie?.ratings?.year || ''}`),
    _confidence: getMovieConfidence(movie),
  }));
  effectiveConfidenceThreshold = computeEffectiveConfidenceThreshold(allMovies);
  hasLoadedData = true;

  // Theater dropdown
  const theaters = getAvailableTheaters(data);
  const theaterSelect = document.getElementById('theater-select');
  if (theaterSelect) {
    activeTheater = resolveTheaterValue(activeTheater, theaters) || (
      String(activeTheater).toLowerCase() === 'amc'
        ? 'AMC'
        : 'all'
    );
    theaterSelect.innerHTML = '<option value="all">All Theaters</option>';
    theaterSelect.innerHTML += '<option value="AMC">AMC</option>';

    theaters.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = getDisplayTheaterName(t);
      theaterSelect.appendChild(opt);
    });

    theaterSelect.value = activeTheater;
    theaterSelect.onchange = (e) => {
      const nextTheater = e.target.value || 'all';
      if (nextTheater === 'AMC' && activeTheater !== 'AMC') {
        activeAmc = 'all';
        hasExplicitAmcFilter = false;
      }
      activeTheater = nextTheater;
      render();
    };
  }

  const amcTheaters = getAvailableAmcTheaters(data);
  const amcSelect = document.getElementById('amc-select');
  if (amcSelect) {
    const resolvedAmc = resolveTheaterValue(activeAmc, amcTheaters);
    if (activeTheater === 'AMC' && !hasExplicitAmcFilter) {
      activeAmc = 'all';
    } else {
      activeAmc = resolvedAmc || (String(activeAmc).toLowerCase() === 'none'
        ? 'none'
        : (amcTheaters.includes('AMC Lincoln Square 13') ? 'AMC Lincoln Square 13' : 'all'));
    }
    amcSelect.innerHTML = '<option value="all">All AMC</option>';
    amcSelect.innerHTML += '<option value="none">No AMC</option>';

    amcTheaters.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      amcSelect.appendChild(opt);
    });

    amcSelect.value = activeAmc;
    amcSelect.onchange = (e) => {
      activeAmc = e.target.value || 'all';
      if (activeAmc === 'none' && activeTheater === 'AMC') {
        activeTheater = 'all';
      }
      hasExplicitAmcFilter = activeAmc !== 'all';
      render();
    };
  }

  const datePicker = document.getElementById('date-picker');
  if (datePicker) {
    const bounds = getAvailableDateBounds(data);
    datePicker.min = bounds.min;
    datePicker.max = bounds.max;
    if (dateScope === 'custom' && (!selectedDateISO || selectedDateISO < bounds.min || selectedDateISO > bounds.max)) {
      selectedDateISO = bounds.min;
    }
    datePicker.value = selectedDateISO;
  }

  // Genre dropdown
  const genreSet = new Set();
  (data.movies || []).forEach(m => {
    (m.ratings?.genre || '').split(',').forEach(g => {
      const trimmed = g.trim();
      if (trimmed && trimmed !== 'N/A') genreSet.add(trimmed);
    });
  });
  const genreSelect = document.getElementById('genre-select');
  if (genreSelect) {
    genreSelect.innerHTML = '<option value="all">All</option>';
    const genres = [...genreSet].sort();
    genres.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g;
      opt.textContent = g;
      genreSelect.appendChild(opt);
    });
    activeGenre = resolveGenreValue(activeGenre, genres);
    genreSelect.value = activeGenre;
    genreSelect.addEventListener('change', e => {
      activeGenre = e.target.value;
      render();
    });
  }

  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.value = searchQuery;
  }

  syncShowButtons();
  syncSortButtons();

  render();
}

function renderLoadError(error) {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="empty-state">
      <p>Dashboard data could not be loaded.</p>
      <div style="margin-top:12px; font-family:var(--font-sans); font-size:0.72rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase;">
        The live data file is missing or invalid.
      </div>
    </div>
  `;
  console.error('Failed to load dashboard data', error);
}

// ── FILTER & RENDER ─────────────────────────────────────────────────────────

function getFiltered() {
  const hidden = getHidden();
  const watched = getWatched();
  const today = getTodayLabel();
  const tomorrow = getTomorrowLabel();
  return allMovies.filter(movie => {
    const visibleTheaters = getVisibleTheaters(movie);
    const isHidden = hasStoredMovie(hidden, movie);
    const isSaved = hasStoredMovie(watched, movie);
    if (showMode === 'hidden') {
      if (!isHidden) return false;
    } else {
      if (isHidden) return false;
      if (showMode === 'saved' && !isSaved) return false;
    }
    if (!hasUpcomingShowtimes({ ...movie, theaters: visibleTheaters })) return false;
    if ((movie._confidence ?? getMovieConfidence(movie)) < effectiveConfidenceThreshold) return false;
    if (dateScope === 'today') {
      if (!moviePlayingOn({ ...movie, theaters: visibleTheaters }, today)) return false;
    } else if (dateScope === 'tomorrow') {
      if (!moviePlayingOn({ ...movie, theaters: visibleTheaters }, tomorrow)) return false;
    } else if (dateScope === 'custom') {
      if (!selectedDateISO || !moviePlayingOnISO({ ...movie, theaters: visibleTheaters }, selectedDateISO)) return false;
    }
    if (activeTheater !== 'all') {
      const inTheater = visibleTheaters.length > 0;
      if (!inTheater) return false;
    }
    if (activeGenre !== 'all') {
      const genres = (movie.ratings?.genre || '').split(',').map(g => g.trim().toLowerCase());
      if (!genres.includes(activeGenre.toLowerCase())) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const title = (movie.title || '').toLowerCase();
      const genre = (movie.ratings?.genre || '').toLowerCase();
      if (!title.includes(q) && !genre.includes(q)) return false;
    }
    return true;
  });
}

function renderSection(label, labelClass, list, main) {
  const section = document.createElement('div');
  section.className = 'verdict-section';
  const header = document.createElement('div');
  header.className = 'verdict-section-header';
  header.innerHTML = `
    <span class="verdict-badge-large ${labelClass}">${label}</span>
    <span class="section-count">${list.length} film${list.length !== 1 ? 's' : ''}</span>
  `;
  section.appendChild(header);
  const grid = document.createElement('div');
  grid.className = 'movies-grid';
  list.forEach((movie, idx) => grid.appendChild(buildCard(movie, idx)));
  section.appendChild(grid);
  main.appendChild(section);
}

function render() {
  if (hasLoadedData) updateUrlFromState();
  if (viewMode === 'theaters') { renderTheaterView(); return; }

  const movies = getFiltered();
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  if (!movies.length) {
    main.innerHTML = '<div class="empty-state"><p>No films match your filters.</p></div>';
    return;
  }

  // ── DAY sort: group by day of week ──────────────────────────────────────
  if (activeSort === 'day' || dateScope !== 'week') {
    const dayOrder = getThisWeekDayOrder();
    const now = getNYNow();
    const todayAbbr = now.toLocaleDateString('en-US', { weekday: 'short', timeZone: NYC_TIMEZONE }).slice(0, 3);
    const tomorrowAbbr = dayOrder[1] || '';
    const dayNames = { Sun: 'Sunday', Mon: 'Monday', Tue: 'Tuesday', Wed: 'Wednesday', Thu: 'Thursday', Fri: 'Friday', Sat: 'Saturday' };

    // Each movie goes into only its EARLIEST upcoming day group (no repeats across days)
    const dayGroups = {};
    dayOrder.forEach(d => { dayGroups[d] = []; });

    movies.forEach(movie => {
      let earliestIdx = 99;
      let earliestAbbr = null;
      getVisibleTheaters(movie).forEach(t => {
        (t.schedule || []).forEach(s => {
          const raw = (s.day || '').trim();
          // Resolve "Today"/"Tomorrow" to their abbr
          let abbr;
          if (/^today$/i.test(raw)) {
            abbr = todayAbbr;
          } else if (/^tomorrow$/i.test(raw)) {
            abbr = tomorrowAbbr;
          } else {
            abbr = raw.slice(0, 3);
          }
          const idx = dayOrder.indexOf(abbr);
          if (idx !== -1 && idx < earliestIdx) {
            // Also verify the movie has at least one upcoming showtime on this day
            const hasFuture = (s.times || []).some(time => {
              const showAt = parseShowtimeDate(raw, time);
              return !!showAt && showAt >= now;
            });
            if (hasFuture) {
              earliestIdx = idx;
              earliestAbbr = abbr;
            }
          }
        });
      });
      if (earliestAbbr) dayGroups[earliestAbbr].push(movie);
    });

    dayOrder.forEach(abbr => {
      const list = dayGroups[abbr];
      if (!list.length) return;
      const isToday = abbr === todayAbbr;
      const isTomorrow = abbr === tomorrowAbbr;
      const label = isToday ? 'Today' : (isTomorrow ? 'Tomorrow' : (dayNames[abbr] || abbr));
      const cls = (isToday || isTomorrow) ? 'watch' : 'skip';
      renderSection(label, cls, list, main);
    });
    return;
  }

  // ── Rating sort: flat list by score ─────────────────────────────────────
  if (activeSort === 'rating') {
    const sorted = [...movies].sort((a, b) => getPriorityScore(b) - getPriorityScore(a));
    const section = document.createElement('div');
    section.className = 'verdict-section';
    const grid = document.createElement('div');
    grid.className = 'movies-grid';
    sorted.forEach((movie, idx) => grid.appendChild(buildCard(movie, idx)));
    section.appendChild(grid);
    main.appendChild(section);
    return;
  }

  // ── Default: verdict groups ─────────────────────────────────────────────
  const sorted = [...movies].sort((a, b) => getPriorityScore(b) - getPriorityScore(a));
  const section = document.createElement('div');
  section.className = 'verdict-section';
  const grid = document.createElement('div');
  grid.className = 'movies-grid';
  sorted.forEach((movie, idx) => grid.appendChild(buildCard(movie, idx)));
  section.appendChild(grid);
  main.appendChild(section);
}

// ── THEATERS VIEW ───────────────────────────────────────────────────────────

function getNextShowFromSchedule(schedule) {
  const now = getNYNow();
  let best = null;
  for (const slot of (schedule || [])) {
    const day = slot?.day || '';
    for (const time of (slot?.times || [])) {
      const at = parseShowtimeDate(day, time);
      if (!at || at < now) continue;
      if (!best || at < best.at) best = { at, day, time };
    }
  }
  return best;
}

function renderTheaterView() {
  const movies = getFiltered();
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  if (!movies.length) {
    renderEmptyState(main);
    return;
  }

  let rendered = 0;
  const grid = document.createElement('div');
  grid.className = 'theater-view-grid';

  const theaterOrder = (
    activeTheater === 'AMC'
      ? (activeAmc !== 'all' ? [activeAmc] : getAvailableAmcTheaters())
      : activeAmc === 'none'
        ? getAvailableTheaters()
      : [
          ...(activeTheater === 'all' ? getAvailableTheaters() : [activeTheater]),
          ...(activeAmc !== 'all' && activeAmc !== 'none' ? [activeAmc] : []),
        ]
  ).sort((a, b) => getTheaterSortLabel(a).localeCompare(getTheaterSortLabel(b), undefined, { sensitivity: 'base' }));

  theaterOrder.forEach(theaterName => {
    // Skip if theater filter is active and this isn't the selected one
    if (activeTheater !== 'all' && activeTheater !== 'AMC' && activeTheater !== theaterName) return;

    // Films at this theater, ordered by active sort mode.
    const filmEntries = movies.map(movie => {
      const theaterData = (movie.theaters || []).find(t => getCanonicalTheaterName(t.name) === theaterName);
      if (!theaterData) return null;
      const nextShow = getNextShowFromSchedule(theaterData.schedule);
      if (!nextShow) return null;
      return { movie, theaterData, nextShow };
    }).filter(Boolean).sort((a, b) => {
      if (activeSort === 'rating') {
        const scoreDelta = getPriorityScore(b.movie) - getPriorityScore(a.movie);
        if (scoreDelta !== 0) return scoreDelta;
      }
      if (a.nextShow.at.getTime() !== b.nextShow.at.getTime()) return a.nextShow.at - b.nextShow.at;
      return (a.movie.title || '').localeCompare(b.movie.title || '');
    });
    if (!filmEntries.length) return;

    const section = document.createElement('div');
    section.className = 'theater-view-section';

    const theaterUrl = getTheaterUrl(theaterName);
    const nameHTML = theaterUrl
      ? `<a href="${theaterUrl}" target="_blank" rel="noopener">${theaterName}</a>`
      : theaterName;

    const headerEl = document.createElement('div');
    headerEl.className = 'theater-view-header';
    headerEl.innerHTML = `
      <span class="theater-view-name">${nameHTML}</span>
      <span class="theater-view-count">${filmEntries.length} film${filmEntries.length !== 1 ? 's' : ''}</span>
    `;
    section.appendChild(headerEl);

    const filmList = document.createElement('div');
    filmList.className = 'theater-film-list';

    filmEntries.forEach(entry => {
      const movie = entry.movie;
      const verdict = getCardTone(movie);
      const watched = hasStoredMovie(getWatched(), movie);
      const ratings = movie.ratings || {};
      const scoreHierarchy = getScoreHierarchy(movie);
      const year = ratings.year || '';
      const director = ratings.director || '';
      const genre = String(ratings.genre || '').trim();
      const runtime = String(ratings.runtime || '').trim();
      const runtimeMinutes = getRuntimeMinutes(runtime);
      const theaterData = entry.theaterData;
      const genreParts = genre && genre !== 'N/A'
        ? genre.split(',').map(part => part.trim()).filter(Boolean).slice(0, 2)
        : [];
      const metaParts = [...genreParts];
      if (runtime && runtime !== 'N/A') {
        const runtimeClass = runtimeMinutes !== null && runtimeMinutes > 150 ? 'theater-film-runtime long' : 'theater-film-runtime';
        metaParts.push(`<span class="${runtimeClass}">${runtime}</span>`);
      }

      const lbSlug = slugifyLetterboxdTitle(movie.title);
      const lbUrl = `https://letterboxd.com/film/${lbSlug}/`;

      const scheduleHTML = theaterData
        ? buildInlineShowtimeHTML(theaterData.schedule, theaterData)
        : '';
      const confidence = getConfidenceNote(movie);
      const isHiddenRow = hasStoredMovie(getHidden(), movie);

      const row = document.createElement('div');
      row.className = `theater-film-row ${verdict}${watched ? ' is-watched' : ''}`;
      row.innerHTML = `
        <div class="theater-film-info">
          <div class="theater-film-head">
            <div class="theater-film-title">
              <a href="${lbUrl}" target="_blank" rel="noopener">${movie.title}</a>
            </div>
            <div class="theater-film-scores">
              ${scoreHierarchy.primary ? `
                <div class="score-primary">
                  <div class="t-score ${scoreHierarchy.primary.className}">${scoreHierarchy.primary.value}</div>
                  <div class="t-score-label">${scoreHierarchy.primary.label}</div>
                </div>
              ` : ''}
              ${scoreHierarchy.secondary.length ? `
                <div class="score-secondary-list">
                  ${scoreHierarchy.secondary.map(score => `
                    <div class="score-secondary-item">
                      <div class="t-score ${score.className}">${score.value}</div>
                      <div class="t-score-label">${score.shortLabel}</div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>
          </div>
          <div class="theater-film-sub">${[year, director].filter(Boolean).join(' · ')}</div>
          ${metaParts.length ? `<div class="theater-film-meta">${metaParts.join(' · ')}</div>` : ''}
          ${confidence ? `<div class="confidence-note">${confidence}</div>` : ''}
          <div class="theater-film-times">${scheduleHTML}</div>
        </div>
        <div class="theater-film-actions">
          ${watched ? `<span class="theater-saved-chip">Saved</span>` : ''}
          <button class="theater-action-btn star${watched ? ' active' : ''}" aria-label="Save movie" title="Save movie" onclick="onTheaterWatched(this, '${String(movie.id).replace(/'/g, "\\'")}', '${movie.title.replace(/'/g, "\\'")}')">★</button>
          <button class="theater-action-btn hide${isHiddenRow ? ' active' : ''}" aria-label="${isHiddenRow ? 'Unhide movie' : 'Hide movie'}" title="${isHiddenRow ? 'Unhide movie' : 'Hide movie'}" onclick="onTheaterHide(this, '${String(movie.id).replace(/'/g, "\\'")}', '${movie.title.replace(/'/g, "\\'")}')">×</button>
        </div>
      `;
      filmList.appendChild(row);
    });

    section.appendChild(filmList);
    grid.appendChild(section);
    rendered++;
  });

  if (!rendered) {
    renderEmptyState(main);
  } else {
    main.appendChild(grid);
  }
}

// ── CARD BUILDER ────────────────────────────────────────────────────────────

function theaterLink(name) {
  const url = getTheaterUrl(name);
  const label = getDisplayTheaterName(name);
  return url
    ? `<a href="${url}" target="_blank" rel="noopener">${label}</a>`
    : label;
}

function buildCard(movie, idx) {
  const verdict = getCardTone(movie);
  const ratings = movie.ratings || {};
  const scoreHierarchy = getScoreHierarchy(movie);
  const rawReason = getDisplayReason(movie);
  const reason = MOCK_REASONS.includes(rawReason) ? '' : rawReason;
  const plot = ratings.plot || '';
  const genre = ratings.genre || '';
  const runtime = ratings.runtime || '';
  const year = ratings.year || '';
  const theaters = getVisibleTheaters(movie);
  const watched = hasStoredMovie(getWatched(), movie);

  // Genre tags
  const tags = genre.split(',').map(g => g.trim()).filter(Boolean);
  if (runtime) tags.push(runtime);

  // Theater rows
  const firstTheater = theaters[0];
  const extraTheaters = theaters.slice(1);

  const tagsHTML = tags.slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('');

  const firstTheaterHTML = firstTheater ? `
    <div class="theater-row">
      <div class="theater-name">${theaterLink(firstTheater.name)}</div>
      ${buildScheduleHTML(firstTheater)}
    </div>
  ` : '';

  const extraHTML = extraTheaters.map(t => `
    <div class="theater-row">
      <div class="theater-name">${theaterLink(t.name)}</div>
      ${buildScheduleHTML(t)}
    </div>
  `).join('');

  const card = document.createElement('div');
  card.className = `movie-card ${verdict}${watched ? ' is-watched' : ''}`;
  card.style.animationDelay = `${idx * 40}ms`;
  card.dataset.title = movie.title;

  const lbSlug = slugifyLetterboxdTitle(movie.title);
  const lbUrl = `https://letterboxd.com/film/${lbSlug}/`;

  card.innerHTML = `
    <div class="card-top">
      <div>
        <div class="movie-title"><a href="${lbUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${movie.title}</a></div>
        <div class="movie-year">${year}${ratings.director ? ' · ' + ratings.director : ''}</div>
      </div>
    </div>

    ${scoreHierarchy.primary ? `
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-value ${scoreHierarchy.primary.className}">${scoreHierarchy.primary.value}</span>
          <span class="meta-label">${scoreHierarchy.primary.label}</span>
        </div>
      </div>
    ` : ''}
    ${scoreHierarchy.secondary.length ? `
      <div class="card-meta secondary">
        ${scoreHierarchy.secondary.map((score, index) => `
          ${index ? '<div class="meta-sep"></div>' : ''}
          <div class="meta-item">
            <span class="meta-value ${score.className}">${score.value}</span>
            <span class="meta-label">${score.shortLabel}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}

    ${reason ? `<div class="card-reason">"${reason}"</div>` : ''}

    ${plot ? `<div class="card-plot">${plot}</div>` : ''}

    <div class="card-theaters">
      ${firstTheaterHTML}
      ${extraTheaters.length ? `
        <button class="expand-theaters" data-label="+ ${extraTheaters.length} more theater${extraTheaters.length > 1 ? 's' : ''}" onclick="toggleTheaters(this)">
          + ${extraTheaters.length} more theater${extraTheaters.length > 1 ? 's' : ''}
        </button>
        <div class="theaters-detail">${extraHTML}</div>
      ` : ''}
    </div>

    <div class="card-actions">
      <button class="action-btn${watched ? ' active-watched' : ''}" onclick="onWatched(this, '${String(movie.id).replace(/'/g, "\\'")}', '${movie.title.replace(/'/g, "\\'")}')">
        ${watched ? '★ Saved' : 'Save'}
      </button>
      <button class="action-btn" onclick="onHide(this, '${String(movie.id).replace(/'/g, "\\'")}', '${movie.title.replace(/'/g, "\\'")}')">
        Not Interested
      </button>
    </div>
  `;

  return card;
}

function onWatched(btn, movieId, title) {
  toggleWatched(movieId, title);
  const card = btn.closest('.movie-card');
  const isNowWatched = hasStoredMovie(getWatched(), movieId, title);
  card.classList.toggle('is-watched', isNowWatched);
  btn.classList.toggle('active-watched', isNowWatched);
  btn.textContent = isNowWatched ? '★ Saved' : 'Save';
}

function onHide(btn, movieId, title) {
  toggleHidden(movieId, title);
  const card = btn.closest('.movie-card');
  card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
  card.style.opacity = '0';
  card.style.transform = 'scale(0.97)';
  setTimeout(() => render(), 320);
}

function onTheaterWatched(btn, movieId, title) {
  toggleWatched(movieId, title);
  const row = btn.closest('.theater-film-row');
  const isNowWatched = hasStoredMovie(getWatched(), movieId, title);
  row?.classList.toggle('is-watched', isNowWatched);
  btn.classList.toggle('active', isNowWatched);
  btn.setAttribute('aria-pressed', isNowWatched ? 'true' : 'false');
  btn.setAttribute('title', isNowWatched ? 'Saved' : 'Save movie');
}

function onTheaterHide(btn, movieId, title) {
  toggleHidden(movieId, title);
  const isStillHidden = hasStoredMovie(getHidden(), movieId, title);
  btn.classList.toggle('active', isStillHidden);
  btn.setAttribute('title', isStillHidden ? 'Unhide movie' : 'Hide movie');
  btn.setAttribute('aria-label', isStillHidden ? 'Unhide movie' : 'Hide movie');
  const row = btn.closest('.theater-film-row');
  if (row && !isStillHidden) {
    row.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
    row.style.opacity = '0';
    row.style.transform = 'scale(0.98)';
  }
  setTimeout(() => render(), 220);
}

function makeSlug(title) {
  return title
    .toLowerCase()
    .replace(/['']/g, '')
    .replace(/[.,:!?()&]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

function getTicketUrl(theaterData) {
  return String(theaterData?.ticket_url || getTheaterUrl(theaterData?.name) || '').trim();
}

function slugifyLetterboxdTitle(title) {
  return String(title || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/['']/g, '')
    .replace(/\.\.\./g, '')
    .replace(/[.,:!?()&]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

function buildScheduleHTML(theaterData) {
  const schedule = theaterData?.schedule || [];
  if (!schedule || !schedule.length) return '';
  const url = getTicketUrl(theaterData);
  const now = getNYNow();
  const activeDayLabel = getActiveDayFilterLabel();
  const upcoming = schedule
    .filter(s => dayMatchesActiveScope(s.day, activeDayLabel))
    .map(s => {
      const times = (s.times || []).filter(time => {
        const showAt = parseShowtimeDate(s.day, time);
        return !!showAt && showAt >= now;
      });
      return { ...s, times };
    })
    .filter(s => s.times.length > 0);

  if (!upcoming.length) return '';

  return upcoming.slice(0, 3).map(s => `
      <div>
      <div class="theater-day">${s.day}</div>
      <div class="showtime-list">
        ${(s.times || []).map(t => {
          const label = formatShowtimeLabel(t);
          return url ? `<a href="${url}" target="_blank" rel="noopener" class="showtime-chip showtime-link">${label}</a>` : `<span class="showtime-chip">${label}</span>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function buildInlineShowtimeHTML(schedule, theaterData, limit = 8) {
  if (!schedule || !schedule.length) return '';
  const url = getTicketUrl(theaterData);
  const now = getNYNow();
  const activeDayLabel = getActiveDayFilterLabel();
  const grouped = [];
  let count = 0;

  for (const s of schedule) {
    if (!dayMatchesActiveScope(s.day, activeDayLabel)) continue;
    const dayRaw = String(s.day || '').trim();
    const times = [];

    for (const t of (s.times || [])) {
      const showAt = parseShowtimeDate(dayRaw, t);
      if (!showAt || showAt < now) continue;
      times.push({ at: showAt, label: formatShowtimeLabel(t) });
    }

    if (!times.length) continue;
    times.sort((a, b) => a.at - b.at);
    grouped.push({
      dayLabel: dateScope === 'today' ? '' : getShowtimeDayLabel(dayRaw),
      times,
    });
  }

  if (!grouped.length) return '';

  return grouped.map(group => {
    const chips = [];
    for (const item of group.times) {
      if (count >= limit) break;
      chips.push(url ? `<a href="${url}" target="_blank" rel="noopener" class="showtime-chip showtime-link">${item.label}</a>` : `<span class="showtime-chip">${item.label}</span>`);
      count += 1;
    }
    if (!chips.length) return '';
    return `
      <div class="theater-film-day-group">
        ${group.dayLabel ? `<div class="theater-day">${group.dayLabel}</div>` : ''}
        <div class="showtime-list">${chips.join('')}</div>
      </div>
    `;
  }).join('');
}

function toggleTheaters(btn) {
  const detail = btn.nextElementSibling;
  detail.classList.toggle('open');
  const originalLabel = btn.dataset.label || btn.getAttribute('data-label') || '+ more theaters';
  btn.textContent = detail.classList.contains('open')
    ? '↑ collapse'
    : originalLabel;
}

function syncDateScopeButtons() {
  const todayBtn = document.getElementById('today-btn');
  const tomorrowBtn = document.getElementById('tomorrow-btn');
  const weekBtn = document.getElementById('thisweek-btn');
  const dateBtn = document.getElementById('pickdate-btn');
  const dateWrap = document.querySelector('.date-picker-wrap');
  const dateInput = document.getElementById('date-picker');
  const buttons = [
    { el: todayBtn, active: dateScope === 'today' },
    { el: tomorrowBtn, active: dateScope === 'tomorrow' },
    { el: weekBtn, active: dateScope === 'week' },
    { el: dateBtn, active: dateScope === 'custom' },
  ];

  buttons.forEach(({ el, active }) => {
    if (!el) return;
    el.classList.toggle('active', active);
    el.style.borderColor = active ? '' : 'var(--accent-dim)';
    el.style.color = active ? '' : 'var(--accent)';
  });

  if (dateBtn) {
    dateBtn.textContent = dateScope === 'custom' ? getCustomDateLabel() : 'Select Date';
  }
  if (dateWrap) {
    dateWrap.classList.toggle('active', dateScope === 'custom');
  }
  if (dateInput && window.matchMedia('(max-width: 768px)').matches) {
    dateInput.setAttribute('aria-label', dateScope === 'custom' ? getCustomDateLabel() : 'Select Date');
  }
}

function openDatePicker() {
  const dateInput = document.getElementById('date-picker');
  if (!dateInput) return;
  if (typeof dateInput.showPicker === 'function') {
    dateInput.showPicker();
    return;
  }
  dateInput.focus();
  dateInput.click();
}

document.getElementById('tomorrow-btn')?.addEventListener('click', () => {

document.getElementById('thisweek-btn')?.addEventListener('click', () => {
