<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NYC Cinema — This Week</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Poiret+One&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080606;
      --off-black: #100d0a;
      --charcoal: #17120f;
      --dark-gray: #2a2118;
      --mid-gray: #4d3b25;
      --muted: #8e7c63;
      --text: #f5eddc;
      --text-dim: #c5b396;
      --cream: #fff5e3;
      --accent: #d7b36a;
      --accent-bright: #f1d79a;
      --accent-dim: #7a5a23;
      --watch: #5bb780;
      --watch-bg: #10281a;
      --depends: #d7b36a;
      --depends-bg: #2a1d08;
      --skip: #cb6d66;
      --skip-bg: #30110f;
      --safe-top: env(safe-area-inset-top, 0px);
      --font-sans: 'Poiret One', sans-serif;
      --font-display: 'Limelight', serif;
      --panel-glow: rgba(215, 179, 106, 0.18);
    }

    html {
      font-size: 17px;
      scroll-behavior: smooth;
      background: var(--black);
    }

    body {
      background:
        radial-gradient(circle at top center, rgba(215, 179, 106, 0.08), transparent 30%),
        linear-gradient(180deg, #140f0b 0%, #090807 45%, #070606 100%);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    /* Film grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background-image:
        linear-gradient(90deg, transparent 0, rgba(215,179,106,0.02) 50%, transparent 100%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.38;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: calc(var(--safe-top) + 20px);
      background:
        linear-gradient(180deg, rgba(8,6,6,0.96), rgba(8,6,6,0.78));
      pointer-events: none;
      z-index: 90;
    }

    /* ── HEADER ────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid rgba(215, 179, 106, 0.35);
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 110;
      background: linear-gradient(180deg, rgba(20,15,11,0.96), rgba(10,8,7,0.92));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 -1px 0 rgba(255, 239, 202, 0.05);
    }

    header::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: calc(-1 * var(--safe-top));
      height: var(--safe-top);
      background: linear-gradient(180deg, rgba(20,15,11,0.96), rgba(10,8,7,0.92));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 74px;
      gap: 32px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: var(--accent-bright);
      white-space: nowrap;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(215, 179, 106, 0.1);
    }

    .logo span {
      color: var(--accent);
    }

    .week-label {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── FILTERS ───────────────────────────────────────────── */
    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font-sans);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(215, 179, 106, 0.32);
      background: linear-gradient(180deg, rgba(30,22,16,0.94), rgba(17,13,10,0.94));
      color: var(--text-dim);
      box-shadow: inset 0 1px 0 rgba(255, 244, 217, 0.04);
      cursor: pointer;
      transition: all 0.18s ease, transform 0.18s ease;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent-bright);
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(215, 179, 106, 0.14), 0 10px 24px rgba(0, 0, 0, 0.26);
    }

    .filter-btn.active {
      background: linear-gradient(180deg, #e4c37d, #c89e54);
      border-color: #f0d8a3;
      color: #16110b;
      box-shadow: 0 0 0 1px rgba(240, 216, 163, 0.2), 0 8px 24px rgba(215, 179, 106, 0.2);
    }

    /* ── HERO / STATS BAR ──────────────────────────────────── */
    .stats-bar {
      border-bottom: 1px solid rgba(215, 179, 106, 0.18);
      padding: 22px 40px 18px;
      background:
        linear-gradient(180deg, rgba(19,14,11,0.92), rgba(11,9,8,0.8));
    }

    .stats-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      flex-wrap: wrap;
    }

    .date-scope-row {
      border-bottom: 1px solid rgba(215, 179, 106, 0.12);
      padding: 18px 40px 10px;
      background:
        linear-gradient(180deg, rgba(11,9,8,0.86), rgba(11,9,8,0));
    }

    .date-scope-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .date-scope-inner .filter-btn {
      font-size: 1rem;
      font-weight: 700;
      padding: 12px 22px;
      letter-spacing: 0.16em;
    }

    .search-wrap {
      flex: 1;
      max-width: 420px;
      min-width: 220px;
      position: relative;
    }

    .theater-select {
      min-width: 180px;
    }

    .search-input {
      width: 100%;
      background: linear-gradient(180deg, rgba(30,22,16,0.98), rgba(16,13,10,0.98));
      border: 1px solid rgba(215, 179, 106, 0.2);
      border-radius: 999px;
      padding: 10px 16px 10px 38px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(215, 179, 106, 0.16), 0 0 28px rgba(215, 179, 106, 0.08);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.8rem;
    }

    .control-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .control-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }

    /* ── MAIN GRID ─────────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 42px 40px 100px;
    }

    /* ── VERDICT SECTION HEADERS ───────────────────────────── */
    .verdict-section {
      margin-bottom: 56px;
    }

    .verdict-section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--dark-gray);
    }

    .verdict-badge-large {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 2px;
      font-weight: 700;
    }

    .verdict-badge-large.watch {
      background: var(--watch-bg);
      color: var(--watch);
      border: 1px solid var(--watch);
    }
    .verdict-badge-large.depends {
      background: var(--depends-bg);
      color: var(--depends);
      border: 1px solid var(--depends);
    }
    .verdict-badge-large.skip {
      background: var(--skip-bg);
      color: var(--skip);
      border: 1px solid var(--skip);
    }

    .section-count {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── MOVIE GRID ────────────────────────────────────────── */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--mid-gray);
      border: 1px solid var(--mid-gray);
    }

    /* Compact list mode */
    body.compact-mode .movies-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body.compact-mode .movie-card {
      padding: 16px 18px;
      gap: 10px;
    }

    body.compact-mode .movie-title {
      font-size: 1.1rem;
      font-weight: 800;
    }

    body.compact-mode .movie-year {
      font-size: 0.78rem;
    }

    body.compact-mode .card-tags,
    body.compact-mode .card-reason,
    body.compact-mode .card-plot,
    body.compact-mode .card-actions,
    body.compact-mode .expand-theaters,
    body.compact-mode .theaters-detail {
      display: none;
    }

    /* ── MOVIE CARD ────────────────────────────────────────── */
    .movie-card {
      background: var(--off-black);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: background 0.15s ease;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .movie-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.15s;
    }

    .movie-card.watch::before { background: var(--watch); }
    .movie-card.depends::before { background: var(--depends); }
    .movie-card.skip::before { background: var(--skip); }

    .movie-card:hover {
      background: var(--charcoal);
    }

    /* Card top row */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-top > div {
      min-width: 0;
      flex: 1;
    }

    .movie-title {
      font-family: var(--font-sans);
      font-size: 1.65rem;
      font-weight: 900;
      line-height: 1.2;
      color: var(--cream);
      flex: 1;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .movie-year {
      font-family: var(--font-sans);
      font-size: 0.86rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Verdict badge */
    .verdict-pill {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .verdict-pill.watch { background: var(--watch-bg); color: var(--watch); }
    .verdict-pill.depends { background: var(--depends-bg); color: var(--depends); }
    .verdict-pill.skip { background: var(--skip-bg); color: var(--skip); }

    /* Meta row */
    .card-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .meta-value {
      font-family: var(--font-sans);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .meta-value.rt-high { color: var(--watch); }
    .meta-value.rt-mid { color: var(--depends); }
    .meta-value.rt-low { color: var(--skip); }

    .meta-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-sep {
      width: 1px;
      height: 28px;
      background: var(--dark-gray);
    }

    /* Genre + runtime row */
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      background: var(--dark-gray);
      color: var(--text-dim);
    }

    /* Reason */
    .card-reason {
      font-size: 0.88rem;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.5;
      border-left: 2px solid var(--mid-gray);
      padding-left: 12px;
    }

    /* Plot */
    .card-plot {
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Theaters */
    .card-theaters {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .theater-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .theater-name {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .showtime-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .showtime-chip {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 2px;
      border: 1px solid var(--mid-gray);
      color: var(--text-dim);
      text-decoration: none;
      display: inline-block;
    }

    a.showtime-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      cursor: pointer;
    }

    .theater-day {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 2px;
      letter-spacing: 0.03em;
    }

    /* Expand toggle */
    .expand-theaters {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-top: 4px;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }

    .expand-theaters:hover { color: var(--accent); }

    .theaters-detail { display: none; }
    .theaters-detail.open { display: flex; flex-direction: column; gap: 10px; }

    /* Theater link */
    .theater-name a {
      color: var(--accent);
      text-decoration: none;
    }
    .theater-name a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── CARD ACTIONS ──────────────────────────────────────── */
    .card-actions {
      display: flex;
      gap: 8px;
      padding-top: 4px;
      border-top: 1px solid var(--dark-gray);
      margin-top: 4px;
    }

    .action-btn {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      border: 1px solid var(--mid-gray);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .action-btn.active-watched { border-color: var(--watch); color: var(--watch); background: var(--watch-bg); }
    .action-btn.active-hidden { border-color: var(--skip); color: var(--skip); background: var(--skip-bg); }

    /* Watched card overlay */
    .movie-card.is-watched {
      opacity: 0.5;
    }
    .movie-card.is-watched .movie-title::after {
      content: ' ✓';
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: var(--watch);
      font-weight: 700;
    }

    /* Hidden card */
    .movie-card.is-hidden {
      display: none;
    }

    /* ── EMPTY STATE ───────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }

    .empty-state p {
      font-family: var(--font-sans);
      font-size: 1.15rem;
      font-weight: 600;
    }

    /* ── LOADING ────────────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .loading-text {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── FOOTER ────────────────────────────────────────────── */
    footer {
      border-top: 1px solid rgba(215, 179, 106, 0.18);
      padding: 28px 40px;
      text-align: center;
      background: linear-gradient(180deg, rgba(10,8,7,0), rgba(16,13,10,0.84));
    }

    .footer-text {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── ANIMATIONS ────────────────────────────────────────── */
    .movie-card {
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* stagger via nth-child */
    .movie-card:nth-child(1) { animation-delay: 0ms; }
    .movie-card:nth-child(2) { animation-delay: 40ms; }
    .movie-card:nth-child(3) { animation-delay: 80ms; }
    .movie-card:nth-child(4) { animation-delay: 120ms; }
    .movie-card:nth-child(5) { animation-delay: 160ms; }
    .movie-card:nth-child(6) { animation-delay: 200ms; }

    /* ── THEATERS VIEW ─────────────────────────────────────── */
    .theater-view-section {
      margin-bottom: 72px;
      position: relative;
    }

    .theater-view-header {
      display: flex;
      align-items: baseline;
      gap: 18px;
      margin-bottom: 14px;
      padding: 0 0 20px;
      border-bottom: 1px solid rgba(215, 179, 106, 0.3);
      position: relative;
    }

    .theater-view-header::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -1px;
      width: min(360px, 52%);
      height: 3px;
      background: linear-gradient(90deg, var(--accent-bright), var(--accent), transparent);
      box-shadow: 0 0 18px rgba(215, 179, 106, 0.14);
    }

    .theater-view-name {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-bright);
      text-shadow: 0 0 20px rgba(215, 179, 106, 0.08);
    }

    .theater-view-name a {
      color: var(--accent-bright);
      text-decoration: none;
    }
    .theater-view-name a:hover { color: var(--accent); }

    .theater-view-count {
      font-family: var(--font-sans);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .theater-view-grid {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .theater-film-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      padding: 4px 2px 10px;
    }

    .theater-film-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px 20px 18px 22px;
      border: 1px solid rgba(215, 179, 106, 0.18);
      border-radius: 18px;
      position: relative;
      transition: background 0.16s ease, transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      min-width: 0;
      background:
        linear-gradient(180deg, rgba(24,18,14,0.96), rgba(14,11,9,0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 245, 227, 0.03),
        0 14px 30px rgba(0, 0, 0, 0.24);
    }

    .theater-film-row::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 16px;
      bottom: 16px;
      width: 2px;
      border-radius: 999px;
      opacity: 0.9;
    }

    .theater-film-row::after {

<script>
let allMovies = [];
let dateScope = 'today'; // week | today | tomorrow
let activeTheater = 'all';
let activeGenre = 'all';
let searchQuery = '';
let activeSort = 'day';
let viewMode = 'theaters';
const CONFIDENCE_THRESHOLD = 60;
const NYC_TIMEZONE = 'America/New_York';

// ── DATE HELPERS ───────────────────────────────────────────────────────────

function getNYNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: NYC_TIMEZONE }));
}

function getTodayLabel() {
  // Returns e.g. "Mar 31" to match against "Tue Mar 31" schedule day strings
  return getNYNow().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getTomorrowLabel() {
  const d = getNYNow();
  d.setDate(d.getDate() + 1);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getThisWeekDayOrder() {
  // Returns sorted day labels starting from today
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const todayIdx = getNYNow().getDay();
  const ordered = [];
  for (let i = 0; i < 7; i++) ordered.push(days[(todayIdx + i) % 7]);
  return ordered;
}

function getActiveDayFilterLabel() {
  if (dateScope === 'today') return getTodayLabel();
  if (dateScope === 'tomorrow') return getTomorrowLabel();
  return null;
}

function getShowtimeDayShortLabel(dayLabel) {
  const raw = String(dayLabel || '').trim();
  if (!raw) return '';
  if (/^today$/i.test(raw)) {
    return getNYNow().toLocaleDateString('en-US', { weekday: 'short' });
  }
  if (/^tomorrow$/i.test(raw)) {
    const d = getNYNow();
    d.setDate(d.getDate() + 1);
    return d.toLocaleDateString('en-US', { weekday: 'short' });
  }
  return raw.slice(0, 3);
}

function dayMatchesActiveScope(dayLabel, activeDayLabel) {
  if (!activeDayLabel) return true;
  const raw = String(dayLabel || '').trim();
  if (!raw) return false;
  if (raw.includes(activeDayLabel)) return true;
  if (/^today$/i.test(raw)) return activeDayLabel === getTodayLabel();
  if (/^tomorrow$/i.test(raw)) return activeDayLabel === getTomorrowLabel();
  return false;
}

function parseShowtimeDate(dayLabel, timeLabel) {
  const timeStr = String(timeLabel || '').trim().toUpperCase().replace(/\s+/g, ' ');
  if (!timeStr) return null;

  const timeMatch = timeStr.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if (!timeMatch) return null;

  let hour = parseInt(timeMatch[1], 10);
  const minute = parseInt(timeMatch[2] || '0', 10);
  const meridiem = timeMatch[3].toUpperCase();
  if (meridiem === 'PM' && hour !== 12) hour += 12;
  if (meridiem === 'AM' && hour === 12) hour = 0;

  const now = getNYNow();
  const dayText = String(dayLabel || '').trim();
  let baseDate = null;

  if (/^today$/i.test(dayText)) {
    baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  } else if (/^tomorrow$/i.test(dayText)) {
    baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  } else if (/^yesterday$/i.test(dayText)) {
    baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  }

  const mdMatch = !baseDate ? dayText.match(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(\d{1,2})\b/i) : null;
  if (!baseDate && mdMatch) {
    baseDate = new Date(now.getFullYear(), new Date(`${mdMatch[1]} 1, ${now.getFullYear()}`).getMonth(), parseInt(mdMatch[2], 10));
  } else if (!baseDate) {
    const weekdayMap = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6 };
    const weekday = weekdayMap[dayText.slice(0, 3).toLowerCase()];
    if (weekday === undefined) return null;
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let diff = weekday - today.getDay();
    if (diff < 0) diff += 7;
    baseDate = new Date(today);
    baseDate.setDate(today.getDate() + diff);
  }

  if (!(baseDate instanceof Date) || Number.isNaN(baseDate.getTime())) return null;
  baseDate.setHours(hour, minute, 0, 0);
  return baseDate;
}

function hasUpcomingShowtimes(movie) {
  const now = getNYNow();
  return (movie.theaters || []).some(t =>
    (t.schedule || []).some(s =>
      (s.times || []).some(time => {
        const showAt = parseShowtimeDate(s.day, time);
        return !!showAt && showAt >= now;
      })
    )
  );
}

function getVisibleTheaters(movie) {
  const theaters = movie?.theaters || [];
  if (activeTheater === 'all') return theaters;
  return theaters.filter(t => getCanonicalTheaterName(t?.name) === activeTheater);
}

function moviePlayingOn(movie, dateLabel) {
  const now = getNYNow();
  return getVisibleTheaters(movie).some(t =>
    (t.schedule || []).some(s =>
      (s.day || '').includes(dateLabel) &&
      (s.times || []).some(time => {
        const showAt = parseShowtimeDate(s.day, time);
        return !!showAt && showAt >= now;
      })
    )
  );
}

function movieEarliestDayIdx(movie, dayOrder) {
  let best = 99;
  getVisibleTheaters(movie).forEach(t =>
    (t.schedule || []).forEach(s => {
      const d = (s.day || '').slice(0, 3);
      const idx = dayOrder.indexOf(d);
      if (idx !== -1 && idx < best) best = idx;
    })
  );
  return best;
}

// ── THEATER URLs ───────────────────────────────────────────────────────────
const THEATER_URLS = {
  'Metrograph': 'https://metrograph.com',
  'IFC Center': 'https://ifccenter.com',
  'Angelika Film Center': 'https://angelikafilmcenter.com/nyc',
  'Angelika': 'https://angelikafilmcenter.com/nyc',
  'Film Forum': 'https://www.filmforum.org/now-playing/',
  'Film': 'https://www.filmforum.org/now-playing/',
  'Village East by Angelika': 'https://angelikafilmcenter.com/villageeast',
  'Lincoln Center - Film at Lincoln Center': 'https://www.filmlinc.org/now-playing/',
  'Film at Lincoln Center': 'https://www.filmlinc.org/now-playing/',
  'FLC': 'https://www.filmlinc.org/now-playing/',
  'Alamo Drafthouse Lower Manhattan': 'https://drafthouse.com/nyc',
  'Alamo': 'https://drafthouse.com/nyc',
  'Paris Theater': 'https://www.paristheaternyc.com/',
  'Paris': 'https://www.paristheaternyc.com/',
};

const CANONICAL_THEATERS = [
  'Metrograph',
  'IFC Center',
  'Angelika Film Center',
  'Film Forum',
  'Village East by Angelika',
  'Film at Lincoln Center',
  'Alamo Drafthouse Lower Manhattan',
  'Paris Theater',
];

const THEATER_ALIASES = {
  'flc': 'Film at Lincoln Center',
  'lincoln center - film at lincoln center': 'Film at Lincoln Center',
  'lincoln center': 'Film at Lincoln Center',
  'film at lincoln center': 'Film at Lincoln Center',
  'film linc': 'Film at Lincoln Center',
  'film': 'Film Forum',
  'film forum': 'Film Forum',
  'angelika': 'Angelika Film Center',
  'angelika film center': 'Angelika Film Center',
  'alamo': 'Alamo Drafthouse Lower Manhattan',
  'alamo drafthouse lower manhattan': 'Alamo Drafthouse Lower Manhattan',
  'paris': 'Paris Theater',
  'paris theater': 'Paris Theater',
  'ifc': 'IFC Center',
  'ifc center': 'IFC Center',
  'metro': 'Metrograph',
  'metrograph': 'Metrograph',
  'village': 'Village East by Angelika',
  'village east': 'Village East by Angelika',
  'village east by angelika': 'Village East by Angelika',
};

// ── MOCK REASON STRINGS (suppress these) ───────────────────────────────────
const MOCK_REASONS = [
  "Critics are united — this one earns its runtime.",
  "Strong but divisive — know what you're signing up for.",
  "The scores don't lie — pass on this one.",
];

function hasReviewSignals(movie) {
  const ratings = movie?.ratings || {};
  const rt = ratings.rt;
  const cinemaScore = ratings.cinemaScore;
  const imdb = ratings.imdb;
  const letterboxd = ratings.letterboxd;

  const hasRT = typeof rt === 'string' && rt.includes('%');
  const hasCinemaScore = cinemaScore && cinemaScore !== 'N/A';
  const hasImdb = imdb && imdb !== 'N/A';
  const hasLetterboxd = letterboxd && letterboxd !== 'N/A';

  return Boolean(hasRT || hasCinemaScore || hasImdb || hasLetterboxd);
}

function getDisplayVerdict(movie) {
  const rawVerdict = movie?.verdict?.verdict || 'SKIP';
  const cinemaWeight = getCinemaScoreWeight(movie?.ratings?.cinemaScore);
  if (cinemaWeight !== null) {
    return cinemaWeight <= 65 ? 'SKIP' : 'WATCH';
  }

  const rt = parseInt(movie?.ratings?.rt || '', 10);
  if (Number.isFinite(rt)) {
    return rt < 50 ? 'SKIP' : 'WATCH';
  }

  const lb = parseFloat(getLetterboxdScore(movie));
  if (Number.isFinite(lb)) {
    return lb < 2.7 ? 'SKIP' : 'WATCH';
  }

  if (rawVerdict === 'SKIP' && !hasReviewSignals(movie)) return 'WATCH';
  return rawVerdict === 'SKIP' ? 'SKIP' : 'WATCH';
}

function getDisplayReason(movie) {
  if (!hasReviewSignals(movie)) return '';
  return movie?.verdict?.reason || '';
}

function getDisplayTheaterName(name) {
  const canonical = getCanonicalTheaterName(name) || String(name || '').trim();
  const shortNames = {
    'Film at Lincoln Center': 'FLC',
    'Alamo Drafthouse Lower Manhattan': 'Alamo',
    'Angelika Film Center': 'Angelika',
    'Village East by Angelika': 'Village East',
    'IFC Center': 'IFC',
    'Paris Theater': 'Paris',
  };
  return shortNames[canonical] || canonical;
}

function getCanonicalTheaterName(name) {
  const raw = String(name || '').trim();
  if (!raw) return '';
  const lowered = raw.toLowerCase();
  const canonical = THEATER_ALIASES[lowered] || raw;
  return CANONICAL_THEATERS.includes(canonical) ? canonical : canonical;
}

function getCinemaScoreWeight(score) {
  if (!score || score === 'N/A') return null;
  const normalized = String(score).trim().toUpperCase();
  const map = {
    'A+': 130, 'A': 120, 'A-': 115,
    'B+': 105, 'B': 100, 'B-': 95,
    'C+': 85, 'C': 80, 'C-': 75,
    'D+': 65, 'D': 60, 'D-': 55,
    'F': 30
  };
  return map[normalized] ?? null;
}

function getLetterboxdScore(movie) {
  const raw = movie?.ratings?.letterboxd;
  if (raw && raw !== 'N/A') return String(raw);
  const imdb = parseFloat(movie?.ratings?.imdb);
  if (Number.isFinite(imdb) && imdb > 0) return (imdb / 2).toFixed(1);
  return null;
}

function getPriorityScore(movie) {
  const cinemaWeight = getCinemaScoreWeight(movie?.ratings?.cinemaScore);
  if (cinemaWeight !== null) return cinemaWeight;

  const rt = parseInt(movie?.ratings?.rt || '0', 10);
  if (Number.isFinite(rt)) return rt;

  const lb = parseFloat(getLetterboxdScore(movie));
  if (Number.isFinite(lb)) return lb * 20;

  return 0;
}

function getMovieConfidence(movie) {
  const ratings = movie?.ratings || {};
  const theaters = movie?.theaters || [];
  const title = String(movie?.title || '').trim();
  const now = getNYNow();

  let score = 0;

  if (title.length >= 2 && title.length <= 80) score += 12;
  if (/[A-Za-z]/.test(title)) score += 4;

  const year = parseInt(String(ratings.year || ''), 10);
  if (Number.isFinite(year) && year >= 1888 && year <= now.getFullYear() + 1) score += 12;

  const director = String(ratings.director || '').trim();
  if (director.length >= 3) score += 8;

  const genre = String(ratings.genre || '').trim();
  if (genre && genre !== 'N/A') score += 8;

  const plot = String(ratings.plot || '').trim();
  if (plot.length >= 60) score += 12;

  const rt = String(ratings.rt || '').trim();
  const hasRT = /^\d{1,3}%$/.test(rt);
  if (hasRT) score += 10;

  const imdb = parseFloat(String(ratings.imdb || ''));
  const hasImdb = Number.isFinite(imdb) && imdb > 0 && imdb <= 10;
  if (hasImdb) score += 8;

  const cinema = String(ratings.cinemaScore || '').trim().toUpperCase();
  const hasCinemaScore = /^(A\+|A-|A|B\+|B-|B|C\+|C-|C|D\+|D-|D|F)$/.test(cinema);
  if (hasCinemaScore) score += 6;

  const lb = parseFloat(String(ratings.letterboxd || ''));
  const hasLetterboxd = Number.isFinite(lb) && lb > 0 && lb <= 5;
  if (hasLetterboxd) score += 6;

  if (theaters.length) score += 8;

  let hasSchedule = false;
  let hasAnyTime = false;
  for (const theater of theaters) {
    const schedule = theater?.schedule || [];
    if (schedule.length) hasSchedule = true;
    for (const day of schedule) {
      const times = day?.times || [];
      if (times.length) hasAnyTime = true;
    }
  }
  if (hasSchedule) score += 8;
  if (hasAnyTime) score += 8;

  const hasAnyReviewSignal = hasRT || hasImdb || hasCinemaScore || hasLetterboxd;
  if (!hasAnyReviewSignal) score -= 8;
  if (plot.length < 20) score -= 8;
  if (!hasAnyTime) score -= 10;

  return score;
}

// ── WATCHED / HIDDEN STATE ─────────────────────────────────────────────────
function getWatched() { try { return JSON.parse(localStorage.getItem('cinema_watched') || '[]'); } catch { return []; } }
function getHidden()  { try { return JSON.parse(localStorage.getItem('cinema_hidden')  || '[]'); } catch { return []; } }
function toggleWatched(title) {
  const list = getWatched();
  const idx = list.indexOf(title);
  if (idx > -1) list.splice(idx, 1); else list.push(title);
  localStorage.setItem('cinema_watched', JSON.stringify(list));
}
function toggleHidden(title) {
  const list = getHidden();
  const idx = list.indexOf(title);
  if (idx > -1) list.splice(idx, 1); else list.push(title);
  localStorage.setItem('cinema_hidden', JSON.stringify(list));
}

// ── DATA LOAD ──────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (!res.ok) {
      throw new Error(`Failed to load data.json (${res.status})`);
    }
    const data = await res.json();
    if (!data || !Array.isArray(data.movies)) {
      throw new Error('Invalid dashboard payload');
    }
    initDashboard(data);
  } catch (e) {
    renderLoadError(e);
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────

function initDashboard(data) {
  allMovies = (data.movies || []).map(movie => ({
    ...movie,
    _confidence: getMovieConfidence(movie),
  }));

  // Week label
  document.getElementById('week-label').textContent = data.week_of
    ? 'Week of ' + data.week_of
    : 'Awaiting latest scrape';

  // Theater dropdown
  const observed = new Set([
    ...(data.theaters || []),
    ...((data.movies || []).flatMap(m => (m.theaters || []).map(t => t?.name))),
  ].map(t => getCanonicalTheaterName(t)).filter(Boolean));
  const theaters = CANONICAL_THEATERS
    .filter(t => observed.has(t))
    .sort((a, b) => getDisplayTheaterName(a).localeCompare(getDisplayTheaterName(b)));
  const theaterSelect = document.getElementById('theater-select');
  if (theaterSelect) {
    if (activeTheater !== 'all' && !theaters.includes(activeTheater)) activeTheater = 'all';
    theaterSelect.innerHTML = '<option value="all">All Theaters</option>';

    theaters.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = getDisplayTheaterName(t);
      theaterSelect.appendChild(opt);
    });

    theaterSelect.value = activeTheater;
    theaterSelect.onchange = (e) => {
      activeTheater = e.target.value || 'all';
      render();
    };
  }

  // Genre dropdown
  const genreSet = new Set();
  (data.movies || []).forEach(m => {
    (m.ratings?.genre || '').split(',').forEach(g => {
      const trimmed = g.trim();
      if (trimmed && trimmed !== 'N/A') genreSet.add(trimmed);
    });
  });
  const genreSelect = document.getElementById('genre-select');
  if (genreSelect) {
    genreSelect.innerHTML = '<option value="all">All</option>';
    [...genreSet].sort().forEach(g => {
      const opt = document.createElement('option');
      opt.value = g;
      opt.textContent = g;
      genreSelect.appendChild(opt);
    });
    genreSelect.value = activeGenre !== 'all' && genreSet.has(activeGenre) ? activeGenre : 'all';
    genreSelect.addEventListener('change', e => {
      activeGenre = e.target.value;
      render();
    });
  }

  render();
}

function renderLoadError(error) {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="empty-state">
      <p>Dashboard data could not be loaded.</p>
      <div style="margin-top:12px; font-family:var(--font-sans); font-size:0.72rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase;">
        The live data file is missing or invalid.
      </div>
    </div>
  `;
  console.error('Failed to load dashboard data', error);
}

// ── FILTER & RENDER ─────────────────────────────────────────────────────────

function getFiltered() {
  const hidden = getHidden();
  const today = getTodayLabel();
  const tomorrow = getTomorrowLabel();
  return allMovies.filter(movie => {
    const visibleTheaters = getVisibleTheaters(movie);
    if (hidden.includes(movie.title)) return false;
    if (!hasUpcomingShowtimes({ ...movie, theaters: visibleTheaters })) return false;
    if ((movie._confidence ?? getMovieConfidence(movie)) < CONFIDENCE_THRESHOLD) return false;
    if (dateScope === 'today') {
      if (!moviePlayingOn({ ...movie, theaters: visibleTheaters }, today)) return false;
    } else if (dateScope === 'tomorrow') {
      if (!moviePlayingOn({ ...movie, theaters: visibleTheaters }, tomorrow)) return false;
    }
    if (activeTheater !== 'all') {
      const inTheater = visibleTheaters.length > 0;
      if (!inTheater) return false;
    }
    if (activeGenre !== 'all') {
      const genres = (movie.ratings?.genre || '').split(',').map(g => g.trim().toLowerCase());
      if (!genres.includes(activeGenre.toLowerCase())) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const title = (movie.title || '').toLowerCase();
      const genre = (movie.ratings?.genre || '').toLowerCase();
      if (!title.includes(q) && !genre.includes(q)) return false;
    }
    return true;
  });
}

// ── SORT ────────────────────────────────────────────────────────────────────

function setSort(mode) {
  activeSort = mode;
  ['rating', 'day'].forEach(m => {
    document.getElementById('sort-' + m)?.classList.toggle('active', m === mode);
  });
  render();
}

function setView(mode) {
  const prevMode = viewMode;
  viewMode = mode;
  document.body.classList.toggle('compact-mode', mode === 'list');
  document.getElementById('view-cards')?.classList.toggle('active', mode === 'cards');
  document.getElementById('view-list')?.classList.toggle('active', mode === 'list');
  document.getElementById('view-theaters')?.classList.toggle('active', mode === 'theaters');
  if (mode === 'theaters' || prevMode === 'theaters') render();
}

function initializeViewMode() {
  setView('theaters');
}

function renderSection(label, labelClass, list, main) {
  const section = document.createElement('div');
  section.className = 'verdict-section';
  const header = document.createElement('div');
  header.className = 'verdict-section-header';
  header.innerHTML = `
    <span class="verdict-badge-large ${labelClass}">${label}</span>
    <span class="section-count">${list.length} film${list.length !== 1 ? 's' : ''}</span>
  `;
  section.appendChild(header);
  const grid = document.createElement('div');
  grid.className = 'movies-grid';
  list.forEach((movie, idx) => grid.appendChild(buildCard(movie, idx)));
  section.appendChild(grid);
  main.appendChild(section);
}

function render() {
  if (viewMode === 'theaters') { renderTheaterView(); return; }

  const movies = getFiltered();
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  if (!movies.length) {
    main.innerHTML = '<div class="empty-state"><p>No films match your filters.</p></div>';
    return;
  }

  // ── DAY sort: group by day of week ──────────────────────────────────────
  if (activeSort === 'day' || dateScope !== 'week') {
    const dayOrder = getThisWeekDayOrder();
    const now = getNYNow();
    const todayAbbr = now.toLocaleDateString('en-US', { weekday: 'short', timeZone: NYC_TIMEZONE }).slice(0, 3);
    const tomorrowAbbr = dayOrder[1] || '';
    const dayNames = { Sun: 'Sunday', Mon: 'Monday', Tue: 'Tuesday', Wed: 'Wednesday', Thu: 'Thursday', Fri: 'Friday', Sat: 'Saturday' };

    // Each movie goes into only its EARLIEST upcoming day group (no repeats across days)
    const dayGroups = {};
    dayOrder.forEach(d => { dayGroups[d] = []; });

    movies.forEach(movie => {
      let earliestIdx = 99;
      let earliestAbbr = null;
      getVisibleTheaters(movie).forEach(t => {
        (t.schedule || []).forEach(s => {
          const raw = (s.day || '').trim();
          // Resolve "Today"/"Tomorrow" to their abbr
          let abbr;
          if (/^today$/i.test(raw)) {
            abbr = todayAbbr;
          } else if (/^tomorrow$/i.test(raw)) {
            abbr = tomorrowAbbr;
          } else {
            abbr = raw.slice(0, 3);
          }
          const idx = dayOrder.indexOf(abbr);
          if (idx !== -1 && idx < earliestIdx) {
            // Also verify the movie has at least one upcoming showtime on this day
            const hasFuture = (s.times || []).some(time => {
              const showAt = parseShowtimeDate(raw, time);
              return !!showAt && showAt >= now;
            });
            if (hasFuture) {
              earliestIdx = idx;
              earliestAbbr = abbr;
            }
          }
        });
      });
      if (earliestAbbr) dayGroups[earliestAbbr].push(movie);
    });

    dayOrder.forEach(abbr => {
      const list = dayGroups[abbr];
      if (!list.length) return;
      const isToday = abbr === todayAbbr;
      const isTomorrow = abbr === tomorrowAbbr;
      const label = isToday ? 'Today' : (isTomorrow ? 'Tomorrow' : (dayNames[abbr] || abbr));
      const cls = (isToday || isTomorrow) ? 'watch' : 'skip';
      renderSection(label, cls, list, main);
    });
    return;
  }

  // ── Rating sort: flat list by score ─────────────────────────────────────
  if (activeSort === 'rating') {
    const sorted = [...movies].sort((a, b) => getPriorityScore(b) - getPriorityScore(a));
    const section = document.createElement('div');
    section.className = 'verdict-section';
    const grid = document.createElement('div');
    grid.className = 'movies-grid';
    sorted.forEach((movie, idx) => grid.appendChild(buildCard(movie, idx)));
    section.appendChild(grid);
    main.appendChild(section);
    return;
  }

  // ── Default: verdict groups ─────────────────────────────────────────────
  const sorted = [...movies].sort((a, b) => getPriorityScore(b) - getPriorityScore(a));
  const section = document.createElement('div');
  section.className = 'verdict-section';
  const grid = document.createElement('div');
  grid.className = 'movies-grid';
  sorted.forEach((movie, idx) => grid.appendChild(buildCard(movie, idx)));
  section.appendChild(grid);
  main.appendChild(section);
}

// ── THEATERS VIEW ───────────────────────────────────────────────────────────

function getNextShowFromSchedule(schedule) {
  const now = getNYNow();
  let best = null;
  for (const slot of (schedule || [])) {
    const day = slot?.day || '';
    for (const time of (slot?.times || [])) {
      const at = parseShowtimeDate(day, time);
      if (!at || at < now) continue;
      if (!best || at < best.at) best = { at, day, time };
    }
  }
  return best;
}

function renderTheaterView() {
  const movies = getFiltered();
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  if (!movies.length) {
    main.innerHTML = '<div class="empty-state"><p>No films match your filters.</p></div>';
    return;
  }

  let rendered = 0;
  const grid = document.createElement('div');
  grid.className = 'theater-view-grid';

  const theaterOrder = [...CANONICAL_THEATERS]
    .sort((a, b) => getDisplayTheaterName(a).localeCompare(getDisplayTheaterName(b)));

  theaterOrder.forEach(theaterName => {
    // Skip if theater filter is active and this isn't the selected one
    if (activeTheater !== 'all' && activeTheater !== theaterName) return;

    // Films at this theater, ordered by active sort mode.
    const filmEntries = movies.map(movie => {
      const theaterData = (movie.theaters || []).find(t => getCanonicalTheaterName(t.name) === theaterName);
      if (!theaterData) return null;
      const nextShow = getNextShowFromSchedule(theaterData.schedule);
      if (!nextShow) return null;
      return { movie, theaterData, nextShow };
    }).filter(Boolean).sort((a, b) => {
      if (activeSort === 'rating') {
        const scoreDelta = getPriorityScore(b.movie) - getPriorityScore(a.movie);
        if (scoreDelta !== 0) return scoreDelta;
      }
      if (a.nextShow.at.getTime() !== b.nextShow.at.getTime()) return a.nextShow.at - b.nextShow.at;
      return (a.movie.title || '').localeCompare(b.movie.title || '');
    });
    if (!filmEntries.length) return;

    const section = document.createElement('div');
    section.className = 'theater-view-section';

    const theaterUrl = THEATER_URLS[theaterName] || '';
    const nameHTML = theaterUrl
      ? `<a href="${theaterUrl}" target="_blank" rel="noopener">${theaterName}</a>`
      : theaterName;

    const headerEl = document.createElement('div');
    headerEl.className = 'theater-view-header';
    headerEl.innerHTML = `
      <span class="theater-view-name">${nameHTML}</span>
      <span class="theater-view-count">${filmEntries.length} film${filmEntries.length !== 1 ? 's' : ''}</span>
    `;
    section.appendChild(headerEl);

    const filmList = document.createElement('div');
    filmList.className = 'theater-film-list';

    filmEntries.forEach(entry => {
      const movie = entry.movie;
      const verdict = getDisplayVerdict(movie).toLowerCase();
      const ratings = movie.ratings || {};
      const rt = (ratings.rt && ratings.rt !== 'N/A') ? ratings.rt : null;
      const letterboxd = getLetterboxdScore(movie);
      const year = ratings.year || '';
      const director = ratings.director || '';
      const theaterData = entry.theaterData;

      let rtClass = '';
      if (rt) {
        const n = parseInt(rt);
        rtClass = n >= 80 ? 'rt-high' : n >= 60 ? 'rt-mid' : 'rt-low';
      }

      const lbSlug = movie.title
        .toLowerCase()
        .replace(/['']/g, '')
        .replace(/[.,:!?()&]/g, '')
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
      const lbUrl = `https://letterboxd.com/film/${lbSlug}/`;

      const scheduleHTML = theaterData
        ? buildInlineShowtimeHTML(theaterData.schedule, theaterData.name, movie.title)
        : '';

      const row = document.createElement('div');
      row.className = `theater-film-row ${verdict}`;
      row.innerHTML = `
        <div class="theater-film-info">
          <div class="theater-film-head">
            <div class="theater-film-title">
              <a href="${lbUrl}" target="_blank" rel="noopener">${movie.title}</a>
            </div>
            <div class="theater-film-scores">
              ${rt ? `<div><div class="t-score ${rtClass}">${rt}</div><div class="t-score-label">RT</div></div>` : ''}
              ${letterboxd ? `<div><div class="t-score lb-score">${letterboxd}</div><div class="t-score-label">LB</div></div>` : ''}
            </div>
          </div>
          <div class="theater-film-sub">${[year, director].filter(Boolean).join(' · ')}</div>
          <div class="theater-film-times">${scheduleHTML}</div>
        </div>
      `;
      filmList.appendChild(row);
    });

    section.appendChild(filmList);
    grid.appendChild(section);
    rendered++;
  });

  if (!rendered) {
    main.innerHTML = '<div class="empty-state"><p>No films match your filters.</p></div>';
  } else {
    main.appendChild(grid);
  }
}

// ── CARD BUILDER ────────────────────────────────────────────────────────────

function theaterLink(name) {
  const url = THEATER_URLS[name];
  const label = getDisplayTheaterName(name);
  return url
    ? `<a href="${url}" target="_blank" rel="noopener">${label}</a>`
    : label;
}

function buildCard(movie, idx) {
  const verdict = getDisplayVerdict(movie).toLowerCase();
  const ratings = movie.ratings || {};
  const cinemaScore = (ratings.cinemaScore && ratings.cinemaScore !== 'N/A') ? ratings.cinemaScore : null;
  const letterboxd = getLetterboxdScore(movie);
  const rt = (ratings.rt && ratings.rt !== 'N/A') ? ratings.rt : null;
  const rawReason = getDisplayReason(movie);
  const reason = MOCK_REASONS.includes(rawReason) ? '' : rawReason;
  const plot = ratings.plot || '';
  const genre = ratings.genre || '';
  const runtime = ratings.runtime || '';
  const year = ratings.year || '';
  const theaters = getVisibleTheaters(movie);
  const watched = getWatched().includes(movie.title);

  // RT color
  let rtClass = '';
  if (rt) {
    const n = parseInt(rt);
    rtClass = n >= 80 ? 'rt-high' : n >= 60 ? 'rt-mid' : 'rt-low';
  }

  // Genre tags
  const tags = genre.split(',').map(g => g.trim()).filter(Boolean);
  if (runtime) tags.push(runtime);

  // Theater rows
  const firstTheater = theaters[0];
  const extraTheaters = theaters.slice(1);

  const tagsHTML = tags.slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('');

  const firstTheaterHTML = firstTheater ? `
    <div class="theater-row">
      <div class="theater-name">${theaterLink(firstTheater.name)}</div>
      ${buildScheduleHTML(firstTheater.schedule, firstTheater.name, movie.title)}
    </div>
  ` : '';

  const extraHTML = extraTheaters.map(t => `
    <div class="theater-row">
      <div class="theater-name">${theaterLink(t.name)}</div>
      ${buildScheduleHTML(t.schedule, t.name, movie.title)}
    </div>
  `).join('');

  const card = document.createElement('div');
  card.className = `movie-card ${verdict}${watched ? ' is-watched' : ''}`;
  card.style.animationDelay = `${idx * 40}ms`;
  card.dataset.title = movie.title;

  const lbSlug = movie.title
    .toLowerCase()
    .replace(/['']/g, '')
    .replace(/[.,:!?()&]/g, '')
    .replace(/\.\.\./g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
  const lbUrl = `https://letterboxd.com/film/${lbSlug}/`;

  card.innerHTML = `
    <div class="card-top">
      <div>
        <div class="movie-title"><a href="${lbUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${movie.title}</a></div>
        <div class="movie-year">${year}${ratings.director ? ' · ' + ratings.director : ''}</div>
      </div>
    </div>

    <div class="card-meta">
      ${cinemaScore ? `<div class="meta-item">
        <span class="meta-value">${cinemaScore}</span>
        <span class="meta-label">CinemaScore</span>
      </div>` : ''}
      ${rt ? `<div class="meta-sep"></div><div class="meta-item">
        <span class="meta-value ${rtClass}">${rt}</span>
        <span class="meta-label">Tomatometer</span>
      </div>` : ''}
      ${letterboxd ? `<div class="meta-sep"></div><div class="meta-item">
        <span class="meta-value">${letterboxd}</span>
        <span class="meta-label">Letterboxd</span>
      </div>` : ''}
    </div>

    ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}

    ${reason ? `<div class="card-reason">"${reason}"</div>` : ''}

    ${plot ? `<div class="card-plot">${plot}</div>` : ''}

    <div class="card-theaters">
      ${firstTheaterHTML}
      ${extraTheaters.length ? `
        <button class="expand-theaters" data-label="+ ${extraTheaters.length} more theater${extraTheaters.length > 1 ? 's' : ''}" onclick="toggleTheaters(this)">
          + ${extraTheaters.length} more theater${extraTheaters.length > 1 ? 's' : ''}
        </button>
        <div class="theaters-detail">${extraHTML}</div>
      ` : ''}
    </div>

    <div class="card-actions">
      <button class="action-btn${watched ? ' active-watched' : ''}" onclick="onWatched(this, '${movie.title.replace(/'/g, "\\'")}')">
        ${watched ? '✓ Watched' : 'Mark Watched'}
      </button>
      <button class="action-btn" onclick="onHide(this, '${movie.title.replace(/'/g, "\\'")}')">
        Not Interested
      </button>
    </div>
  `;

  return card;
}

function onWatched(btn, title) {
  toggleWatched(title);
  const card = btn.closest('.movie-card');
  const isNowWatched = getWatched().includes(title);
  card.classList.toggle('is-watched', isNowWatched);
  btn.classList.toggle('active-watched', isNowWatched);
  btn.textContent = isNowWatched ? '✓ Watched' : 'Mark Watched';
}

function onHide(btn, title) {
  toggleHidden(title);
  const card = btn.closest('.movie-card');
  card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
  card.style.opacity = '0';
  card.style.transform = 'scale(0.97)';
  setTimeout(() => render(), 320);
}

function makeSlug(title) {
  return title
    .toLowerCase()
    .replace(/['']/g, '')
    .replace(/[.,:!?()&]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

function getTicketUrl(theaterName, movieTitle) {
  const slug = makeSlug(movieTitle);
  const enc = encodeURIComponent(movieTitle);
  switch (theaterName) {
    case 'Metrograph':
      return `https://metrograph.com/film/?slug=${slug}`;
    case 'IFC Center':
      return `https://www.ifccenter.com/films/${slug}/`;
    case 'Angelika Film Center':
      return `https://www.fandango.com/search?q=${enc}&location=New+York+NY`;
    case 'Film Forum':
    case 'Film':
      return `https://www.filmforum.org/now-playing/`;
    case 'Village East by Angelika':
      return `https://www.fandango.com/search?q=${enc}&location=New+York+NY`;
    case 'Lincoln Center - Film at Lincoln Center':
    case 'Film at Lincoln Center':
    case 'FLC':
      return `https://www.filmlinc.org/now-playing/`;
    case 'Alamo Drafthouse Lower Manhattan':
    case 'Alamo':
      return `https://drafthouse.com/nyc/show/${slug}`;
    case 'Paris Theater':
    case 'Paris':
      return `https://www.paristheaternyc.com/`;
    default:
      return `https://www.fandango.com/search?q=${enc}&location=New+York+NY`;
  }
}

function buildScheduleHTML(schedule, theaterName, movieTitle) {
  if (!schedule || !schedule.length) return '';
  const url = getTicketUrl(theaterName, movieTitle);
  const now = getNYNow();
  const activeDayLabel = getActiveDayFilterLabel();
  const upcoming = schedule
    .filter(s => dayMatchesActiveScope(s.day, activeDayLabel))
    .map(s => {
      const times = (s.times || []).filter(time => {
        const showAt = parseShowtimeDate(s.day, time);
        return !!showAt && showAt >= now;
      });
      return { ...s, times };
    })
    .filter(s => s.times.length > 0);

  if (!upcoming.length) return '';

  return upcoming.slice(0, 3).map(s => `
    <div>
      <div class="theater-day">${s.day}</div>
      <div class="showtime-list">
        ${(s.times || []).map(t => `<a href="${url}" target="_blank" rel="noopener" class="showtime-chip showtime-link">${t}</a>`).join('')}
      </div>
    </div>
  `).join('');
}

function buildInlineShowtimeHTML(schedule, theaterName, movieTitle, limit = 8) {
  if (!schedule || !schedule.length) return '';
  const url = getTicketUrl(theaterName, movieTitle);
  const now = getNYNow();
  const activeDayLabel = getActiveDayFilterLabel();
  const items = [];

  for (const s of schedule) {
    if (!dayMatchesActiveScope(s.day, activeDayLabel)) continue;
    const dayRaw = String(s.day || '').trim();
    for (const t of (s.times || [])) {
      const showAt = parseShowtimeDate(dayRaw, t);
      if (!showAt || showAt < now) continue;
      items.push({ at: showAt, label: `${getShowtimeDayShortLabel(dayRaw)} ${t}` });
    }
  }

  if (!items.length) return '';
  items.sort((a, b) => a.at - b.at);

  return items.slice(0, limit).map(item =>
    `<a href="${url}" target="_blank" rel="noopener" class="showtime-chip showtime-link">${item.label}</a>`
  ).join('');
}

function toggleTheaters(btn) {
  const detail = btn.nextElementSibling;
  detail.classList.toggle('open');
  btn.textContent = detail.classList.contains('open')
    ? '↑ collapse'
    : btn.dataset.label;
}
