<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Editor · Showtimes NYC</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --off-black: #111;
      --charcoal: #1a1a1a;
      --dark-gray: #2a2a2a;
      --mid-gray: #3a3a3a;
      --text: #e8e2d9;
      --text-dim: #a09880;
      --muted: #666;
      --cream: #f0ece4;
      --accent: #c8a96e;
      --watch: #4a9e6b;
      --depends: #b8922a;
      --skip: #b85050;
      --font: 'Georgia', serif;
      --font-sans: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      font-size: 14px;
    }

    header {
      background: var(--off-black);
      border-bottom: 1px solid var(--dark-gray);
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 20px;
    }

    .logo {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .logo span { color: var(--accent); }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 700px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--charcoal);
      border: 1px solid var(--mid-gray);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.82rem;
      padding: 6px 10px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    select {
      background: var(--charcoal);
      border: 1px solid var(--mid-gray);
      border-radius: 3px;
      color: var(--text-dim);
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }

    .stats {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .stats strong { color: var(--text-dim); }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 32px 80px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .movie-card {
      background: var(--off-black);
      border: 1px solid var(--dark-gray);
      border-radius: 3px;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 14px;
      transition: border-color 0.15s;
    }
    .movie-card:hover { border-color: var(--mid-gray); }
    .movie-card.is-manual { border-left: 3px solid var(--accent); }
    .movie-card.is-ai { border-left: 3px solid var(--watch); }
    .movie-card.is-none { border-left: 3px solid var(--dark-gray); }

    .movie-score {
      text-align: right;
      padding-top: 2px;
    }

    .rt-num {
      font-family: var(--font-sans);
      font-size: 1.4rem;
      font-weight: 900;
      line-height: 1;
    }
    .rt-high { color: var(--watch); }
    .rt-mid  { color: var(--depends); }
    .rt-low  { color: var(--skip); }
    .rt-none { color: var(--muted); }

    .rt-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .movie-body { min-width: 0; }

    .movie-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .movie-title {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--cream);
    }

    .movie-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .source-badge {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 999px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .source-badge.manual { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid rgba(200,169,110,0.3); }
    .source-badge.ai     { background: rgba(74,158,107,0.12); color: var(--watch);  border: 1px solid rgba(74,158,107,0.25); }
    .source-badge.none   { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--dark-gray); }

    .consensus {
      font-size: 0.76rem;
      color: var(--text-dim);
      font-style: italic;
      border-left: 2px solid var(--mid-gray);
      padding-left: 8px;
      margin-bottom: 10px;
      line-height: 1.45;
    }
    .consensus-label {
      font-style: normal;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
    }

    .blurb-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    textarea {
      width: 100%;
      background: var(--charcoal);
      border: 1px solid var(--mid-gray);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font), serif;
      font-size: 0.82rem;
      font-style: italic;
      line-height: 1.55;
      padding: 8px 10px;
      resize: vertical;
      outline: none;
      min-height: 72px;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea.is-dirty { border-color: var(--accent); }
    textarea:disabled { opacity: 0.6; cursor: not-allowed; }
    textarea::placeholder { color: var(--muted); font-style: normal; }

    .blurb-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    button {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 2px;
      border: 1px solid var(--mid-gray);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--cream); color: var(--cream); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-save {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
    }
    .btn-save:hover { opacity: 0.88; color: #111; border-color: var(--accent); }
    .btn-save:disabled { opacity: 0.4; cursor: default; }

    .btn-clear { color: var(--skip); border-color: rgba(184,80,80,0.3); }
    .btn-clear:hover { border-color: var(--skip); color: var(--skip); }

    .btn-hide { color: var(--muted); }
    .btn-hide.is-hidden { color: var(--skip); border-color: rgba(184,80,80,0.35); background: rgba(184,80,80,0.08); }
    .btn-hide:disabled { opacity: 0.35; cursor: not-allowed; }
    .movie-card.is-hidden-movie { opacity: 0.45; }
    .movie-card.is-hidden-movie:hover { opacity: 0.75; }

    .btn-pick { color: var(--accent); border-color: rgba(200,169,110,0.3); }
    .btn-pick:hover { border-color: var(--accent); }
    .btn-pick.is-pick { color: #111; background: var(--accent); border-color: var(--accent); font-weight: 700; }
    .movie-card.is-pick-movie { box-shadow: inset 0 0 0 1px rgba(200,169,110,0.4), 0 0 0 1px rgba(200,169,110,0.15); }

    .btn-criterion { color: #aaa; border-color: rgba(255,255,255,0.15); }
    .btn-criterion:hover { border-color: #aaa; }
    .btn-criterion.is-criterion { color: #f0ece4; background: #111; border-color: rgba(255,255,255,0.3); font-weight: 700; }

    .score-overrides {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .score-override-field {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .score-override-input {
      width: 58px;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      color: var(--cream);
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      padding: 4px 7px;
      outline: none;
    }
    .score-override-input.is-url {
      width: min(360px, 72vw);
    }
    .score-override-input:focus { border-color: var(--accent); }
    .btn-save-scores {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      border: 1px solid rgba(200,169,110,0.35);
      border-radius: 3px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
    }
    .btn-save-scores:hover { background: rgba(200,169,110,0.1); }
    .btn-save-scores:disabled { opacity: 0.4; cursor: default; }

    .saved-flash {
      font-size: 0.68rem;
      color: var(--watch);
      font-weight: 600;
      letter-spacing: 0.05em;
      opacity: 0;
      max-width: min(520px, 100%);
      transition: opacity 0.3s;
    }
    .saved-flash.error { color: var(--skip); }
    .saved-flash.show { opacity: 1; }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state h2 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; color: var(--text-dim); }
    .empty-state p { font-size: 0.82rem; }

    .admin-warning {
      border: 1px solid rgba(200,169,110,0.35);
      background: rgba(200,169,110,0.08);
      color: var(--text-dim);
      border-radius: 3px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 0.76rem;
      line-height: 1.45;
    }
    .admin-warning strong {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.68rem;
    }

    .analytics-dashboard {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .analytics-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .analytics-section-title {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-card,
    .top-list-card {
      background: var(--off-black);
      border: 1px solid var(--dark-gray);
      border-radius: 3px;
      padding: 14px 16px;
    }

    .metric-value {
      font-size: 1.75rem;
      font-weight: 900;
      line-height: 1;
      color: var(--cream);
      margin-bottom: 6px;
    }

    .metric-label {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .metric-detail {
      margin-top: 8px;
      font-size: 0.72rem;
      color: var(--text-dim);
      line-height: 1.45;
    }

    .top-list-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .top-list-title {
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 10px;
    }

    .top-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .top-list-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 8px;
      align-items: baseline;
      min-width: 0;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .top-list-row:last-child { border-bottom: none; padding-bottom: 0; }

    .top-list-rank {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
    }

    .top-list-movie {
      min-width: 0;
      color: var(--text-dim);
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .top-list-count {
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .analytics-note {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.5;
    }

    @media (max-width: 860px) {
      .metric-grid,
      .top-list-grid {
        grid-template-columns: 1fr;
      }
    }

    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .btn-signout {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 2px;
      border: 1px solid var(--mid-gray);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-signout:hover { border-color: var(--text-dim); color: var(--text-dim); }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--charcoal);
      border: 1px solid var(--mid-gray);
      border-radius: 3px;
      padding: 2px;
      flex-shrink: 0;
    }
    .view-btn {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .view-btn.active { background: var(--mid-gray); color: var(--text); }
    .view-btn:hover:not(.active) { color: var(--text-dim); }

    /* ── RANKINGS PREVIEW ── */
    .rankings-preview { display: flex; flex-direction: column; gap: 2px; }

    .rp-card {
      display: grid;
      grid-template-columns: 52px 72px 1fr;
      gap: 16px;
      background: var(--off-black);
      border: 1px solid var(--dark-gray);
      border-radius: 3px;
      padding: 14px 18px;
      align-items: start;
      transition: border-color 0.15s;
    }
    .rp-card:hover { border-color: var(--mid-gray); }
    .rp-card.rp-hidden { opacity: 0.4; border-left: 3px solid var(--skip); }
    .rp-card.rp-pick  { box-shadow: inset 0 0 0 1px rgba(200,169,110,0.35); }

    .rp-score { text-align: right; padding-top: 2px; }
    .rp-rt { font-size: 1.3rem; font-weight: 900; line-height: 1; }
    .rp-rt.high { color: var(--watch); }
    .rp-rt.mid  { color: var(--depends); }
    .rp-rt.low  { color: var(--skip); }
    .rp-rt.nr   { color: var(--muted); font-size: 1rem; }
    .rp-rt-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

    .rp-poster { width: 72px; height: 108px; object-fit: cover; border-radius: 2px; background: var(--charcoal); display: block; }
    .rp-poster-placeholder { width: 72px; height: 108px; border-radius: 2px; background: var(--charcoal); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; color: var(--muted); }

    .rp-body { min-width: 0; }
    .rp-title { font-size: 0.95rem; font-weight: 800; color: var(--cream); margin-bottom: 2px; }
    .rp-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; }
    .rp-blurb { font-size: 0.78rem; font-style: italic; color: var(--text-dim); line-height: 1.5; border-left: 2px solid var(--mid-gray); padding-left: 8px; }
    .rp-blurb.no-blurb { font-style: normal; color: var(--muted); opacity: 0.6; }
    .rp-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .rp-badge { font-size: 0.58rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; }
    .rp-badge.hidden { background: rgba(184,80,80,0.12); color: var(--skip); border: 1px solid rgba(184,80,80,0.3); }
    .rp-badge.pick   { background: rgba(200,169,110,0.12); color: var(--accent); border: 1px solid rgba(200,169,110,0.3); }
    .rp-badge.doc    { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--dark-gray); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Showtimes <span>NYC</span> · Review Editor</div>
    <div class="controls">
      <input type="text" id="search" placeholder="Search films…" oninput="renderList()">
      <select id="filter" onchange="renderList()">
        <option value="all">All films</option>
        <option value="manual">Manual</option>
        <option value="ai">AI generated</option>
        <option value="none">No review</option>
      </select>
    </div>
    <div class="stats" id="stats"></div>
    <div class="view-toggle">
      <button id="btn-editor" class="view-btn active" onclick="setView('editor')">Editor</button>
      <button id="btn-rankings" class="view-btn" onclick="setView('rankings')">Rankings</button>
      <button id="btn-analytics" class="view-btn" onclick="setView('analytics')">Analytics</button>
    </div>
    <button class="btn-signout" onclick="resetAdminSession()">Sign out</button>
  </div>
</header>

<main id="main">
  <div class="loading-state">Loading films…</div>
</main>

<script>
const STORAGE_KEY = 'cinema_movie_blurbs';
const HIDDEN_KEY = 'cinema_hidden';
const MAX_CHARS = 340;

const SUPABASE_URL      = 'https://dsvhzhjcmvsiuokrpuci.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzdmh6aGpjbXZzaXVva3JwdWNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5Nzc4OTQsImV4cCI6MjA5NDU1Mzg5NH0.hoLyb6jWEPNHNzCMGLXm5Zddo0QOzZwseMjxmja8bgI';
const ADMIN_EMAILS = ['danymora131@hotmail.com'];

// _sbAuth: authenticated client — handles login/logout and reads on the admin page.
const _sbAuth = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// _sb: alias for reads (anon is fine; RLS allows SELECT for all tables used here).
const _sb = _sbAuth;

// fetchAuth: bypass Supabase JS client auth injection for writes by passing the
// access token explicitly. The JS client's session-to-header wiring is unreliable
// when multiple GoTrueClient instances exist in the same context.
async function fetchAuth(path, options = {}) {
  const { data: { session } } = await _sbAuth.auth.getSession();
  if (!session?.access_token) throw new Error('Not authenticated');
  const resp = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      ...(options.headers || {}),
    },
  });
  if (!resp.ok) {
    let err = {};
    try { err = await resp.json(); } catch (_) {}
    throw { message: err.message || `HTTP ${resp.status}`, code: err.code, details: err.details };
  }
}

function isAdminSession(session) {
  return ADMIN_EMAILS.includes(session?.user?.email);
}

async function requireAuth() {
  const { data: { session } } = await _sbAuth.auth.getSession();
  if (!isAdminSession(session)) {
    showLoginScreen();
    throw new Error('Not authenticated');
  }
  return session;
}

let picks = new Set();
let canEditPicks = true;
let allMovies = [];
let blurbCache = {};
let canEditBlurbs = true;
let siteHidden = new Set();
let canEditSiteHidden = true;
let adminWarnings = [];
let analyticsData = null;
let analyticsError = '';
let analyticsLoading = false;

function addAdminWarning(message) {
  if (!adminWarnings.includes(message)) adminWarnings.push(message);
}

async function loadPicks() {
  const { data, error } = await _sb.from('picks').select('movie_id');
  if (error) {
    canEditPicks = false;
    addAdminWarning('Recommendations are unavailable because Supabase denied access to picks. Film data and review editing can still load.');
    console.warn('picks unavailable:', error);
    return;
  }
  if (data) data.forEach(r => picks.add(r.movie_id));
}

function isPick(movie) {
  return picks.has(getMovieId(movie));
}

async function togglePick(movie, btn, card) {
  await requireAuth();
  if (!canEditPicks) {
    throw new Error('Recommendations are unavailable for this account.');
  }
  const id = getMovieId(movie);
  const title = movie.title || '';
  const wasPicked = picks.has(id);
  btn.disabled = true;
  try {
    if (wasPicked) {
      await fetchAuth(`picks?movie_id=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
      picks.delete(id);
      btn.textContent = 'Recommend';
      btn.classList.remove('is-pick');
      card.classList.remove('is-pick-movie');
    } else {
      await fetchAuth(`picks?on_conflict=movie_id`, {
        method: 'POST',
        headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({ movie_id: id, title }),
      });
      picks.add(id);
      btn.textContent = '✦ Recommended';
      btn.classList.add('is-pick');
      card.classList.add('is-pick-movie');
    }
  } catch (e) {
    console.error('picks error:', e);
    const msg = getErrorMessage(e);
    showWriteError(msg);
    btn.textContent = 'Error';
    btn.title = msg;
    setTimeout(() => {
      btn.textContent = wasPicked ? '✦ Recommended' : 'Recommend';
      btn.title = '';
    }, 9000);
    btn.classList.toggle('is-pick', wasPicked);
    card.classList.toggle('is-pick-movie', wasPicked);
  } finally {
    btn.disabled = false;
  }
}

  try { await _sbAuth.auth.signOut(); } catch (e) { /* ignore */ }
  try {
    Object.keys(localStorage)
      .filter(key => key.startsWith('sb-'))
      .forEach(key => localStorage.removeItem(key));
  } catch (e) { /* ignore */ }
  location.reload();
}

async function tryLogin() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('pw-input').value;
  const error = document.getElementById('pw-error');
  const button = document.getElementById('login-btn');
  error.textContent = '';
  if (button) {
    button.disabled = true;
    button.textContent = 'Signing in...';
  }
  try {
    const { data: signInData, error: authError } = await _sbAuth.auth.signInWithPassword({ email, password });
    if (authError) throw authError;
    if (!ADMIN_EMAILS.includes(signInData.user?.email)) {
      await _sbAuth.auth.signOut();
      throw new Error('Access denied.');
    }
    location.reload();
  } catch (e) {
    error.textContent = e?.message || 'Could not sign in.';

    document.getElementById('pw-input').focus();
    if (button) {
      button.disabled = false;

function getPrestigeTag(movie) {
  return blurbCache[getKey(movie)]?.prestige_tag || '';
}

async function replaceBlurbRow(movie, entry) {
  await requireAuth();
  if (!canEditBlurbs) {
    throw new Error('Manual reviews are unavailable for this account.');
  }
  const key = getKey(movie);
  const row = {
    movie_key: key,
    title: movie.title || '',
    text: entry.text || '',
    source: entry.source || 'manual',
    prestige_tag: entry.prestige_tag || null,
    rt_override: entry.rt_override || null,
    cinema_score_override: entry.cinema_score_override || null,
    lb_override: entry.lb_override || null,
    rt_url_override: entry.rt_url_override || null,
    updated_at: new Date().toISOString(),
  };

  await fetchAuth(`blurbs?on_conflict=movie_key`, {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(row),
  });

  blurbCache[key] = {
    text: row.text,
    source: row.source,
    prestige_tag: row.prestige_tag || '',
    rt_override: row.rt_override || '',
    cinema_score_override: row.cinema_score_override || '',
    lb_override: row.lb_override || '',
    rt_url_override: row.rt_url_override || '',
  };
  return blurbCache[key];
}

async function toggleCriterion(movie, btn) {
  const key = getKey(movie);
  const current = blurbCache[key]?.prestige_tag || '';
  const next = current === 'CRITERION COLLECTION' ? '' : 'CRITERION COLLECTION';
  const originalText = btn.textContent;
  btn.disabled = true;
  try {
    const entry = blurbCache[key] || {};
    await replaceBlurbRow(movie, {
      ...entry,
      prestige_tag: next,
    });
    btn.textContent = next ? '✦ Criterion' : 'Criterion';
    btn.classList.toggle('is-criterion', !!next);
  } catch (e) {
    console.error('criterion error:', e);
    const msg = getErrorMessage(e);
    showWriteError(msg);
    btn.textContent = 'Error';
    btn.title = msg;
    setTimeout(() => {
      btn.textContent = originalText;
      btn.title = '';
    }, 9000);
  } finally {
    btn.disabled = false;
  }
}

function getKey(movie) {
  const title = cleanDisplayText(movie?.title);
  const year = cleanDisplayText(movie?.ratings?.year);
  return `${title}-${year}`;
}

function cleanDisplayText(value) {
  const text = String(value || '').trim();
  if (!text || text.toUpperCase() === 'N/A') return '';
  return text;
}

function normalizeReviewText(value) {
  return String(value || '').trim().slice(0, MAX_CHARS);
}

function normalizeRTOverride(value) {
  const text = String(value || '').trim();
  if (!text) return null;
  const parsed = Number(text);
  if (!Number.isInteger(parsed) || parsed < 0 || parsed > 100) {
    throw new Error('RT override must be a whole number from 0 to 100.');
  }
  return parsed;
}

function normalizeCinemaScoreOverride(value) {
  const text = String(value || '').trim().toUpperCase();
  if (!text) return '';
  if (!/^(A\+|A|A-|B\+|B|B-|C\+|C|C-|D\+|D|D-|F)$/.test(text)) {
    throw new Error('CinemaScore override must be A+ through F.');
  }
  return text;
}

function normalizeLetterboxdOverride(value) {
  const text = String(value || '').trim();
  if (!text) return null;
  const parsed = Number(text);
  if (!Number.isFinite(parsed) || parsed < 0 || parsed > 5) {
    throw new Error('Letterboxd override must be a number from 0 to 5.');
  }
  return parsed;
}

function normalizeRottenTomatoesUrlOverride(value) {
  const text = String(value || '').trim();
  if (!text) return null;
  try {
    const url = new URL(text);
    const host = url.hostname.toLowerCase();
    if (url.protocol !== 'https:' || (host !== 'rottentomatoes.com' && !host.endsWith('.rottentomatoes.com'))) {
      throw new Error();
    }
    return url.href;
  } catch {
    throw new Error('RT URL must be an https://rottentomatoes.com link.');
  }
}

function getRTScore(movie) {
  const v = parseInt(movie?.ratings?.rt || '', 10);
  return Number.isFinite(v) ? v : null;
}

function getRTClass(score) {
  if (score === null) return 'rt-none';
  if (score >= 80) return 'rt-high';
  if (score >= 60) return 'rt-mid';
  return 'rt-low';
}

function getConsensus(movie) {
  const fields = [
    movie?.ratings?.consensus,
    movie?.ratings?.rtConsensus,
    movie?.ratings?.criticConsensus,
    movie?.ratings?.rottenTomatoesConsensus,
    movie?.consensus,
  ];
  for (const f of fields) {
    const t = String(f ?? '').trim();
    if (t && t.toUpperCase() !== 'N/A') return t;
  }
  return '';
}

function getSource(movie) {
  const entry = blurbCache[getKey(movie)];
  if (!entry?.text?.trim()) return 'none';
  return entry.source === 'manual' ? 'manual' : 'ai';
}

function getBlurbText(movie) {
  return blurbCache[getKey(movie)]?.text?.trim() || '';
}

function slugify(str) {
  return String(str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function getMovieId(movie) {
  return movie.id || slugify(`${movie.title || ''}-${movie.ratings?.year || ''}`);
}

function showFlash(el, message, isError = false) {
  if (!el) return;
  el.textContent = message;
  el.title = message;
  el.classList.toggle('error', isError);
  el.classList.add('show');
  setTimeout(() => {
    el.classList.remove('show');
    el.classList.remove('error');
    el.title = '';
    el.textContent = 'Saved';
  }, isError ? 9000 : 1800);
}

function getErrorMessage(error) {
  if (!error) return 'Unknown error';
  const code = error.code || error.status || '';
  const message = error.message || String(error);
  const combined = [code, message].filter(Boolean).join(': ');
  if (code === '42501' || message.includes('row-level security')) {
    return 'Permission denied — run supabase/admin-dashboard-policies.sql in the Supabase SQL editor to grant write access.';
  }
  if (message.includes('JWT') || message.includes('token') || code === 'PGRST301') {
    return 'Session expired — please sign out and sign back in.';
  }
  return combined;
}

function showWriteError(message) {
  let banner = document.getElementById('admin-write-error');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'admin-write-error';
    banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2a0f0f;border:1px solid var(--skip);color:#e07070;font-family:var(--font-sans);font-size:0.78rem;font-weight:600;padding:10px 16px;border-radius:4px;z-index:9999;max-width:560px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.5);cursor:pointer;';
    banner.title = 'Click to dismiss';
    banner.addEventListener('click', () => banner.remove());
    document.body.appendChild(banner);
  }
  banner.textContent = message;
  clearTimeout(banner._timer);
  banner._timer = setTimeout(() => banner.remove(), 15000);
}

async function loadHidden() {
  const { data, error } = await _sb.from('site_hidden').select('movie_id');
  if (error) {
    canEditSiteHidden = false;
    addAdminWarning('Site-wide Hide is unavailable because Supabase denied access to site_hidden. The rest of the editor is still usable.');
    console.warn('site_hidden unavailable:', error);
    return;
  }
  if (data) data.forEach(r => siteHidden.add(r.movie_id));
}

function isHidden(movie) {
  return siteHidden.has(getMovieId(movie));
}

async function toggleHidden(movie) {
  await requireAuth();
  if (!canEditSiteHidden) {
    throw new Error('Site-wide Hide is unavailable for this account.');
  }
  const id = getMovieId(movie);
  if (siteHidden.has(id)) {
    await fetchAuth(`site_hidden?movie_id=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
    siteHidden.delete(id);
    return false;
  } else {
    await fetchAuth(`site_hidden?on_conflict=movie_id`, {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ movie_id: id, title: movie.title || '' }),
    });
    siteHidden.add(id);
    return true;
  }
}

async function saveBlurb(movie, text) {
  const key = getKey(movie);
  const clean = normalizeReviewText(text);
  const entry = blurbCache[key] || {};
  if (!clean) {
    await replaceBlurbRow(movie, {
      ...entry,
      text: '',
      source: 'manual',
    });
  } else {
    await replaceBlurbRow(movie, {
      ...entry,
      text: clean,
      source: 'manual',
    });
  }
}

async function clearBlurb(movie) {
  const key = getKey(movie);
  const entry = blurbCache[key] || {};
  await replaceBlurbRow(movie, {
    ...entry,
    text: '',
    source: 'manual',
  });
}

function renderList() {
  const query = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;
  const main = document.getElementById('main');

  let movies = allMovies.filter(m => {
    if (query) {
      const haystack = `${m.title} ${m.ratings?.director || ''} ${m.ratings?.year || ''}`.toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    if (filter !== 'all') {
      if (getSource(m) !== filter) return false;
    }
    return true;
  });

  // Sort by RT score desc, then title
  movies.sort((a, b) => {
    const ra = getRTScore(a) ?? -1;
    const rb = getRTScore(b) ?? -1;
    return rb - ra || (a.title || '').localeCompare(b.title || '');
  });

  const total = allMovies.length;
  const withBlurb = allMovies.filter(m => getSource(m) !== 'none').length;
  const manual = allMovies.filter(m => getSource(m) === 'manual').length;
  document.getElementById('stats').innerHTML =
    `<strong>${withBlurb}</strong>/${total} reviewed &nbsp;·&nbsp; <strong>${manual}</strong> manual`;

  if (!movies.length) {
    main.innerHTML = `<div class="empty-state"><h2>No films match</h2><p>Try adjusting the search or filter.</p></div>`;
    return;
  }

  main.innerHTML = '';
  adminWarnings.forEach(message => {
    const warning = document.createElement('div');
    warning.className = 'admin-warning';
    warning.innerHTML = `<strong>Limited Access</strong><br>${escapeHTML(message)}`;
    main.appendChild(warning);
  });
  movies.forEach(movie => {
    const card = buildCard(movie);
    main.appendChild(card);
  });
}

function buildCard(movie) {
  const key = getKey(movie);
  const rt = getRTScore(movie);
  const rtClass = getRTClass(rt);
  const rtDisplay = rt !== null ? `${rt}%` : 'NR';
  const source = getSource(movie);
  const blurb = getBlurbText(movie);
  const consensus = getConsensus(movie);
  const meta = [movie.ratings?.year, movie.ratings?.director, movie.ratings?.genre].filter(Boolean).join(' · ');
  const reviewDisabled = canEditBlurbs ? '' : ' disabled title="Manual reviews are unavailable for this account"';
  const pickDisabled = canEditPicks ? '' : ' disabled title="Recommendations are unavailable for this account"';

  const hidden = isHidden(movie);
  const card = document.createElement('div');
  card.className = `movie-card is-${source}${hidden ? ' is-hidden-movie' : ''}`;
  card.dataset.key = key;

  card.innerHTML = `
    <div class="movie-score">
      <div class="rt-num ${rtClass}">${rtDisplay}</div>
      <div class="rt-label">RT</div>
    </div>
    <div class="movie-body">
      <div class="movie-head">
        <span class="movie-title">${escapeHTML(movie.title || '')}</span>
        <span class="movie-meta">${escapeHTML(meta)}</span>
        <span class="source-badge ${source}">${source === 'none' ? 'No review' : source === 'manual' ? 'Manual' : 'AI'}</span>
      </div>
      ${consensus ? `
        <div class="consensus">
          <span class="consensus-label">Critics consensus</span>
          ${escapeHTML(consensus)}
        </div>
      ` : ''}
      <div class="blurb-area">
        <textarea
          rows="3"
          placeholder="Write a review… (leave blank to use AI-generated or consensus)"
          maxlength="340"
          ${reviewDisabled}
        >${escapeHTML(blurb)}</textarea>
        <div class="blurb-actions">
          <button class="btn-save" disabled>Save</button>
          ${blurb ? `<button class="btn-clear"${reviewDisabled}>Clear</button>` : ''}
          <button class="btn-hide${hidden ? ' is-hidden' : ''}"${canEditSiteHidden ? '' : ' disabled title="Site-wide Hide is unavailable for this account"'}>${canEditSiteHidden ? (hidden ? 'Hidden' : 'Hide') : 'Hide unavailable'}</button>
          <button class="btn-pick${isPick(movie) ? ' is-pick' : ''}"${pickDisabled}>${canEditPicks ? (isPick(movie) ? '✦ Recommended' : 'Recommend') : 'Recommend unavailable'}</button>
          <button class="btn-criterion${getPrestigeTag(movie) ? ' is-criterion' : ''}"${reviewDisabled}>${canEditBlurbs ? (getPrestigeTag(movie) ? '✦ Criterion' : 'Criterion') : 'Criterion unavailable'}</button>
          <span class="saved-flash">Saved</span>
        </div>
        <div class="score-overrides">
          <label class="score-override-field">RT% <input class="score-override-input" type="number" min="0" max="100" placeholder="${escapeHTML(movie.ratings?.rt || 'NR')}" value="${escapeHTML(blurbCache[getKey(movie)]?.rt_override || '')}"${reviewDisabled}></label>
          <label class="score-override-field">CS <input class="score-override-input" type="text" placeholder="${escapeHTML(movie.ratings?.cinemaScore || '—')}" value="${escapeHTML(blurbCache[getKey(movie)]?.cinema_score_override || '')}"${reviewDisabled}></label>
          <label class="score-override-field">LB <input class="score-override-input" type="number" min="0" max="5" step="0.1" placeholder="${escapeHTML(movie.ratings?.letterboxd || '—')}" value="${escapeHTML(blurbCache[getKey(movie)]?.lb_override || '')}"${reviewDisabled}></label>
          <label class="score-override-field">RT URL <input class="score-override-input is-url" type="url" inputmode="url" placeholder="https://www.rottentomatoes.com/m/..." value="${escapeHTML(blurbCache[getKey(movie)]?.rt_url_override || '')}"${reviewDisabled}></label>
          <button class="btn-save-scores"${reviewDisabled}>Save ratings</button
          ><span class="saved-flash scores-flash">Saved</span>
        </div>
      </div>
    </div>
  `;

  const textarea = card.querySelector('textarea');
  const saveBtn = card.querySelector('.btn-save');
  const clearBtn = card.querySelector('.btn-clear');
  const flash = card.querySelector('.saved-flash');
  let originalText = blurb;

  if (canEditBlurbs) textarea.addEventListener('input', () => {
    const isDirty = normalizeReviewText(textarea.value) !== originalText;
    textarea.classList.toggle('is-dirty', isDirty);
    saveBtn.disabled = !isDirty;
  });

  saveBtn.addEventListener('click', async () => {
    const text = normalizeReviewText(textarea.value);
    saveBtn.disabled = true;
    textarea.disabled = true;
    try {
      await saveBlurb(movie, text);
      originalText = text;
      textarea.value = text;
      textarea.classList.remove('is-dirty');

      const newSource = text ? 'manual' : 'none';
      card.className = `movie-card is-${newSource}`;
      card.querySelector('.source-badge').className = `source-badge ${newSource}`;
      card.querySelector('.source-badge').textContent = newSource === 'manual' ? 'Manual' : 'No review';

      let clearBtnEl = card.querySelector('.btn-clear');
      if (text && !clearBtnEl) {
        clearBtnEl = document.createElement('button');
        clearBtnEl.className = 'btn-clear';
        clearBtnEl.textContent = 'Clear';
        saveBtn.after(clearBtnEl);
        clearBtnEl.addEventListener('click', () => doClear(clearBtnEl));
      } else if (!text && clearBtnEl) {
        clearBtnEl.remove();
      }

      showFlash(flash, 'Saved');
    } catch (e) {
      console.error('save blurb error:', e);
      const msg = getErrorMessage(e);
      showFlash(flash, msg, true);
      showWriteError(msg);
      saveBtn.disabled = false;
    } finally {
      textarea.disabled = false;
      saveBtn.disabled = normalizeReviewText(textarea.value) === originalText;
    }
  });

  async function doClear(btn) {
    btn.disabled = true;
    try {
      await clearBlurb(movie);
      textarea.value = '';
      originalText = '';
      textarea.classList.remove('is-dirty');
      saveBtn.disabled = true;
      card.className = 'movie-card is-none';
      card.querySelector('.source-badge').className = 'source-badge none';
      card.querySelector('.source-badge').textContent = 'No review';
      btn.remove();
    } catch (e) {
      console.error('clear blurb error:', e);
      const msg = getErrorMessage(e);
      showFlash(flash, msg, true);
      showWriteError(msg);
      btn.disabled = false;
    }
  }

  if (clearBtn) {
    clearBtn.addEventListener('click', () => doClear(clearBtn));
  }

  const hideBtn = card.querySelector('.btn-hide');
  if (canEditSiteHidden) hideBtn.addEventListener('click', async () => {
    hideBtn.disabled = true;
    try {
      const nowHidden = await toggleHidden(movie);
      hideBtn.textContent = nowHidden ? 'Hidden' : 'Hide';
      hideBtn.classList.toggle('is-hidden', nowHidden);
      card.classList.toggle('is-hidden-movie', nowHidden);
    } catch (e) {
      console.error('hide error:', e);
      const msg = getErrorMessage(e);
      hideBtn.textContent = 'Error';
      hideBtn.title = msg;
      showWriteError(msg);
      setTimeout(() => {
        hideBtn.textContent = isHidden(movie) ? 'Hidden' : 'Hide';
        hideBtn.title = '';
      }, 9000);
    } finally {
      hideBtn.disabled = false;
    }
  });

  const pickBtn = card.querySelector('.btn-pick');
  if (canEditPicks) pickBtn.addEventListener('click', () => togglePick(movie, pickBtn, card));
  if (isPick(movie)) card.classList.add('is-pick-movie');

  const criterionBtn = card.querySelector('.btn-criterion');
  if (canEditBlurbs) criterionBtn.addEventListener('click', () => toggleCriterion(movie, criterionBtn));

  const saveScoresBtn = card.querySelector('.btn-save-scores');
  const scoresFlash = card.querySelector('.scores-flash');
  const [rtInput, csInput, lbInput, rtUrlInput] = card.querySelectorAll('.score-override-input');
  if (canEditBlurbs) saveScoresBtn.addEventListener('click', async () => {
    saveScoresBtn.disabled = true;
    const key = getKey(movie);
    const entry = blurbCache[key] || {};
    try {
      const rt = normalizeRTOverride(rtInput.value);
      const cs = normalizeCinemaScoreOverride(csInput.value);
      const lb = normalizeLetterboxdOverride(lbInput.value);
      const rtUrl = normalizeRottenTomatoesUrlOverride(rtUrlInput.value);
      await replaceBlurbRow(movie, {
        ...entry,
        rt_override: rt,
        cinema_score_override: cs || null,
        lb_override: lb,
        rt_url_override: rtUrl,
      });
      showFlash(scoresFlash, 'Saved');
    } catch (e) {
      console.error('score override error:', e);
      const msg = getErrorMessage(e);
      showFlash(scoresFlash, msg, true);
      showWriteError(msg);
    } finally {
      saveScoresBtn.disabled = false;
    }
  });

  return card;
}

function escapeHTML(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderAdminError(error) {
  document.body.innerHTML = `
    <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;padding:24px;">
      <div style="width:min(520px,100%);background:#111;border:1px solid #2a2a2a;border-radius:4px;padding:32px;color:#e8e2d9;font-family:system-ui,sans-serif;">
        <div style="font-size:0.72rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:#666;margin-bottom:16px;">
          Showtimes <span style="color:#c8a96e">NYC</span> · Admin
        </div>
        <h1 style="font-size:1rem;margin:0 0 10px;color:#f0ece4;">Could not load admin data</h1>
        <p style="font-size:0.82rem;line-height:1.55;color:#a09880;margin:0 0 18px;">${escapeHTML(error?.message || 'Something went wrong.')}</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button onclick="location.reload()" style="background:#c8a96e;border:none;border-radius:3px;color:#111;font-size:0.72rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:10px 14px;cursor:pointer;">Retry</button>
          <button onclick="resetAdminSession()" style="background:transparent;border:1px solid #3a3a3a;border-radius:3px;color:#e8e2d9;font-size:0.72rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:10px 14px;cursor:pointer;">Sign out</button>
        </div>
      </div>
    </main>
  `;
}

let adminView = 'editor';

function setView(v) {
  adminView = v;
  document.getElementById('btn-editor').classList.toggle('active', v === 'editor');
  document.getElementById('btn-rankings').classList.toggle('active', v === 'rankings');
  document.getElementById('btn-analytics').classList.toggle('active', v === 'analytics');
  const controls = document.querySelector('.controls');
  if (controls) controls.style.visibility = v === 'editor' ? '' : 'hidden';
  if (v === 'analytics') renderAnalytics({ forceRefresh: true });
  else if (v === 'rankings') renderRankings();
  else renderList();
}

function getRankingsMovies() {
  const byImdb = new Map();
  allMovies.forEach(movie => {
    const rt = getRTScore(movie);
    if (rt === null) return;
    const genre = (movie.ratings?.genre || '').toLowerCase();
    if (genre.includes('documentary') || genre.includes('short')) return;
    const key = movie.ratings?.imdbID || getKey(movie);
    if (!byImdb.has(key)) {
      byImdb.set(key, { ...movie });
    }
  });
  return [...byImdb.values()].sort((a, b) => {
    const ra = getRTScore(a) ?? -1;
    const rb = getRTScore(b) ?? -1;
    return rb - ra || (a.title || '').localeCompare(b.title || '');
  });
}

function renderRankings() {
  const main = document.getElementById('main');
  const movies = getRankingsMovies();

  main.innerHTML = '';
  adminWarnings.forEach(message => {
    const warning = document.createElement('div');
    warning.className = 'admin-warning';
    warning.innerHTML = `<strong>Limited Access</strong><br>${escapeHTML(message)}`;
    main.appendChild(warning);
  });

  if (!movies.length) {
    main.innerHTML += `<div class="empty-state"><h2>No ranked films</h2><p>No films with RT scores found.</p></div>`;
    return;
  }

  movies.forEach(movie => main.appendChild(buildCard(movie)));
}

function formatNumber(value) {
  const n = Number(value || 0);
  return Number.isFinite(n) ? n.toLocaleString() : '0';
}

function metricCard(label, value, detail = '') {
  return `
    <div class="metric-card">
      <div class="metric-value">${formatNumber(value)}</div>
      <div class="metric-label">${escapeHTML(label)}</div>
      ${detail ? `<div class="metric-detail">${detail}</div>` : ''}
    </div>
  `;
}

function getMovieTitleForAnalytics(row) {
  const id = String(row?.movie_id || '');
  const storedTitle = cleanDisplayText(row?.title);
  const movie = allMovies.find(item => getMovieId(item) === id || item.id === id || item.title === id);
  return movie?.title || storedTitle || id || 'Unknown movie';
}

function topListCard(title, rows) {
  const cleanRows = Array.isArray(rows) ? rows : [];
  const body = cleanRows.length
    ? cleanRows.slice(0, 10).map((row, index) => `
        <div class="top-list-row">
          <div class="top-list-rank">${index + 1}</div>
          <div class="top-list-movie" title="${escapeHTML(getMovieTitleForAnalytics(row))}">${escapeHTML(getMovieTitleForAnalytics(row))}</div>
          <div class="top-list-count">${formatNumber(row.count)}</div>
        </div>
      `).join('')
    : `<div class="analytics-note">No activity yet.</div>`;
  return `
    <div class="top-list-card">
      <div class="top-list-title">${escapeHTML(title)}</div>
      <div class="top-list">${body}</div>
    </div>
  `;
}

async function loadAnalytics({ forceRefresh = false } = {}) {
  if (analyticsLoading) return;
  if (!forceRefresh && analyticsData) return;
  analyticsLoading = true;
  analyticsError = '';
  try {
    await requireAuth();
    const { data, error } = await _sbAuth.rpc('get_admin_analytics');
    if (error) throw error;
    analyticsData = data || {};
  } catch (e) {
    console.error('analytics error:', e);
    analyticsError = getErrorMessage(e);
  } finally {
    analyticsLoading = false;
  }
}

async function refreshAnalytics() {
  analyticsData = null;
  analyticsError = '';
  await renderAnalytics({ forceRefresh: true });
}

async function renderAnalytics({ forceRefresh = false } = {}) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  adminWarnings.forEach(message => {
    const warning = document.createElement('div');
    warning.className = 'admin-warning';
    warning.innerHTML = `<strong>Limited Access</strong><br>${escapeHTML(message)}`;
    main.appendChild(warning);
  });

  if (!analyticsData && !analyticsError) {
    main.innerHTML += `<div class="loading-state">Loading analytics…</div>`;
    await loadAnalytics({ forceRefresh });
  }

  if (analyticsError) {
    main.innerHTML = `
      <div class="admin-warning">
        <strong>Analytics unavailable</strong><br>
        ${escapeHTML(analyticsError)}<br><br>
        Run <code>supabase/admin-dashboard-policies.sql</code> in Supabase, then reload this page.
      </div>
    `;
    return;
  }

  const users = analyticsData?.users || {};
  const visits = analyticsData?.visits || {};
  const actions = analyticsData?.actions || {};
  const top = analyticsData?.top || {};
  const generatedAt = analyticsData?.generated_at ? new Date(analyticsData.generated_at) : null;

  main.innerHTML = `
    <div class="analytics-dashboard">
      <div class="analytics-section">
        <div class="analytics-section-title">Audience <button class="view-btn" type="button" onclick="refreshAnalytics()">Refresh</button></div>
        <div class="metric-grid">
          ${metricCard('Signed-up users', users.signed_up, `${formatNumber(users.signed_up_7d)} new in 7 days · ${formatNumber(users.signed_up_30d)} in 30 days`)}
          ${metricCard('Unique visitors', visits.unique_visitors, `${formatNumber(visits.unique_today)} today · ${formatNumber(visits.unique_7d)} in 7 days`)}
          ${metricCard('Total visits', visits.total, `${formatNumber(visits.today)} today · ${formatNumber(visits.last_30d)} in 30 days`)}
        </div>
      </div>

      <div class="analytics-section">
        <div class="analytics-section-title">Movie Actions</div>
        <div class="metric-grid">
          ${metricCard('Saved movies', actions.saved_total, `${formatNumber(actions.saved_users)} users have saved at least one movie`)}
          ${metricCard('Seen movies', actions.seen_total, `${formatNumber(actions.seen_users)} users have marked at least one movie seen`)}
          ${metricCard('Hidden movies', actions.hidden_total, `${formatNumber(actions.hidden_users)} users have hidden at least one movie`)}
        </div>
      </div>

      <div class="analytics-section">
        <div class="analytics-section-title">Most Used Movies</div>
        <div class="top-list-grid">
          ${topListCard('Most Saved', top.saved)}
          ${topListCard('Most Seen', top.seen)}
          ${topListCard('Most Hidden', top.hidden)}
        </div>
      </div>

      <div class="analytics-note">
        Unique visitors are counted by anonymous browser IDs stored locally. Signed-up user totals come from Supabase Auth.
        ${generatedAt ? `Last refreshed ${escapeHTML(generatedAt.toLocaleString())}.` : ''}
      </div>
    </div>
  `;
}

async function init() {
  try {
    if (!await checkAuth()) { showLoginScreen(); return; }
    await Promise.allSettled([loadBlurbs(), loadPicks(), loadHidden()]);
    const res = await fetch('/data.json');
    if (!res.ok) throw new Error('Failed to load data.json');
    const data = await res.json();
    const EXCLUDED = ['Museum of Modern Art'];
    allMovies = (data.movies || [])
      .map(m => ({
        ...m,
        theaters: (m.theaters || []).filter(t => !EXCLUDED.includes(t.name)),
      }))
      .filter(m => m.theaters.length > 0);
    renderList();
  } catch (e) {
    renderAdminError(e);
  }
}

init();
</script>
</body>
</html>
