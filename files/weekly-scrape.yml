name: Weekly Cinema Scrape

on:
  schedule:
    # Trigger on both UTC candidates, then gate to 8:00 AM America/New_York.
    - cron: "0 12 * * 3"
    - cron: "0 13 * * 3"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Run only at 8:00 AM New York time
        run: |
          hour=$(TZ=America/New_York date +%H)
          if [ "$hour" != "08" ]; then
            echo "Skipping run: local NY time is not 08:00."
            exit 0
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python files/scrape.py

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Cinema Bot"
          git add files/data.json
          git diff --staged --quiet || git commit -m "Weekly cinema update — $(date +'%B %d, %Y')"
          git push
